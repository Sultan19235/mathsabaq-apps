<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Өзгеру құлашы, мода және медиана — Мұғалім</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e6e9f0;
  --border:#d2d6e2;--border2:#bcc2d3;
  --text:#141826;--text2:#3b4063;--muted:#7a7f9a;
  --primary:#4338ca;--primary-light:#eef0ff;--primary-dark:#3730a3;
  --green:#059669;--green-light:#ecfdf5;--green-border:#6ee7b7;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;
  --r:14px;
  --shadow-sm:0 1px 3px rgba(20,24,38,.05);
  --shadow:0 2px 10px rgba(20,24,38,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;-webkit-tap-highlight-color:transparent;overflow:hidden}

.screen{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;animation:fadeUp .3s ease}
.screen.active{display:flex}
.si{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px;overflow:hidden}
.si.center{justify-content:center}
.si.top{justify-content:flex-start}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 5px rgba(5,150,105,0)}}

.logo{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
.logo b{color:var(--primary)}
.logo-sub{color:var(--muted);font-size:.78rem;margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.card-title{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:none;border-radius:12px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;touch-action:manipulation;min-height:48px}
.btn:active{transform:scale(.97)}
.btn-block{width:100%}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(67,56,202,.3)}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-sm{padding:7px 14px;font-size:.76rem;min-height:36px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── SETUP ── */
.setup-wrap{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;justify-content:center}
.setup-hero{text-align:center;margin-bottom:24px}
.setup-info{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.setup-info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.setup-info-row:last-child{border-bottom:none}

/* ── LOBBY ── */
.lobby-wrap{width:100%;max-width:860px;height:100%;display:flex;flex-direction:column}
.lobby-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;flex-shrink:0}
.code-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;gap:20px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.code-val{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:800;letter-spacing:4px;color:var(--text);line-height:1}
.qr-box{background:#fff;padding:8px;border-radius:10px;border:1px solid var(--border)}
.lobby-main{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:10px}
.lobby-list{flex:1;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;align-content:start}
.l-stu{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-weight:600;font-size:.9rem}
.l-stu-av{width:28px;height:28px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}

/* ── LIVE ── */
.live-wrap{width:100%;max-width:1100px;height:100%;display:flex;flex-direction:column}
.live-top{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.live-timer{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:800;color:var(--text)}
.live-timer.danger{color:var(--red);animation:pulse 1s infinite}
.live-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-content:start;padding-bottom:20px}
.s-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;position:relative;transition:transform .2s;display:flex;flex-direction:column;gap:10px}
.s-card.flash-g{animation:flashG .8s ease}
.s-card.flash-r{animation:flashR .8s ease}
@keyframes flashG{0%{border-color:var(--green);background:var(--green-light)}100%{border-color:var(--border);background:var(--bg2)}}
@keyframes flashR{0%{border-color:var(--red);background:var(--red-light)}100%{border-color:var(--border);background:var(--bg2)}}
.sc-head{display:flex;justify-content:space-between;align-items:flex-start}
.sc-name{font-weight:700;font-size:1rem}
.sc-lvl{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px}
.sc-score{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:800;line-height:1}
.sc-bar-wrap{background:var(--bg3);height:6px;border-radius:3px;overflow:hidden}
.sc-bar{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.sc-foot{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;font-weight:700}
.sc-focus{display:flex;align-items:center;gap:6px}
.f-dot{width:8px;height:8px;border-radius:50%}
.f-dot.on{background:var(--green);animation:breathe 2s infinite}
.f-dot.off{background:var(--red);animation:pulse 1s infinite}
.sc-warn{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);padding:2px 6px;border-radius:6px;font-family:'JetBrains Mono',monospace}

/* ── RESULTS ── */
.res-wrap{width:100%;max-width:700px;height:100%;display:flex;flex-direction:column}
.lb-list{flex:1;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column}
.lb-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:1.2rem;font-weight:800;width:24px;text-align:center}
.lb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem}
.lb-info{flex:1}
.lb-name{font-weight:700;font-size:1rem}
.lb-stats{font-size:.75rem;color:var(--muted);font-weight:600;margin-top:2px}
.lb-score{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800}
</style>
</head>
<body>

<div id="screen-setup" class="screen active">
  <div class="si center">
    <div class="setup-wrap">
      <div class="setup-hero">
        <div class="logo">Math<b>Sabaq</b></div>
        <div class="logo-sub">Өзгеру құлашы, мода және медиана (3 деңгей)</div>
      </div>
      <div class="setup-info">
        <div class="setup-info-row">
          <div class="setup-info-icon">⏱️</div>
          <div class="setup-info-text">Уақыт шектеуі</div>
          <div class="setup-info-val">45 минут</div>
        </div>
        <div class="setup-info-row">
          <div class="setup-info-icon">🎯</div>
          <div class="setup-info-text">Сұрақтар</div>
          <div class="setup-info-val">Шексіз (3 деңгей)</div>
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="createSession()">Бөлме құру</button>
    </div>
  </div>
</div>

<div id="screen-lobby" class="screen">
  <div class="si top">
    <div class="lobby-wrap">
      <div class="lobby-top">
        <div>
          <div class="logo">Math<b>Sabaq</b></div>
          <div class="logo-sub">Оқушылардың қосылуын күтудеміз...</div>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()">▶ Бастау</button>
      </div>
      <div class="code-panel">
        <div>
          <div class="card-title" style="margin-bottom:4px">Қосылу коды</div>
          <div class="code-val" id="display-code">------</div>
        </div>
        <div class="qr-box" id="qr-container"></div>
      </div>
      <div class="lobby-main">
        <div class="card-title" style="display:flex;justify-content:space-between">
          <span>Күту залы</span>
          <span id="lobby-count">0 оқушы</span>
        </div>
        <div class="lobby-list" id="lobby-students"></div>
      </div>
    </div>
  </div>
</div>

<div id="screen-live" class="screen">
  <div class="si top">
    <div class="live-wrap">
      <div class="live-top">
        <div>
          <div class="logo" style="font-size:1.2rem">Math<b>Sabaq</b> <span style="color:var(--muted);font-weight:600;font-size:1rem;margin-left:8px">КОД: <span id="live-code"></span></span></div>
          <div class="logo-sub" id="live-count">0 оқушы</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="live-timer" id="timer">45:00</div>
          <button class="btn btn-red btn-sm" onclick="endQuiz()">Аяқтау</button>
        </div>
      </div>
      <div class="live-grid" id="live-students"></div>
    </div>
  </div>
</div>

<div id="screen-results" class="screen">
  <div class="si center">
    <div class="res-wrap">
      <div class="lobby-top" style="margin-bottom:16px">
        <div>
          <div class="logo">Қорытынды</div>
          <div class="logo-sub">Тест аяқталды</div>
        </div>
        <div class="card-title" style="margin:0" id="res-sub">0 оқушы</div>
      </div>
      <div class="lb-list" id="leaderboard"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════════════════════════════
const BACKEND = 'https://mathsabaq.online';
const STUDENT_URL = 'https://sultan19235.github.io/mathsabaq-apps/range-mode-median-grade6/student.html';

let sessionCode = '';
let sseSource = null;
let students = new Map();
let prevTotals = new Map();
let timerInterval = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
//  LIFECYCLE API
// ══════════════════════════════════════════════════════════════════
async function createSession() {
  try {
    const res = await fetch(`${BACKEND}/session`, { method: 'POST' });
    const data = await res.json();
    sessionCode = data.code;
    
    document.getElementById('display-code').textContent = sessionCode;
    document.getElementById('live-code').textContent = sessionCode;
    
    const joinUrl = `${STUDENT_URL}?code=${sessionCode}`;
    document.getElementById('qr-container').innerHTML = '';
    new QRCode(document.getElementById('qr-container'), {
      text: joinUrl, width: 80, height: 80,
      colorDark: "#141826", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.L
    });
    
    startSSE();
    showScreen('screen-lobby');
  } catch (err) { alert('Қате: Серверге қосылу мүмкін емес.'); }
}

async function startQuiz() {
  try {
    await fetch(`${BACKEND}/start`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code: sessionCode })
    });
  } catch (err) {}
}

async function endQuiz() {
  if(!confirm('Тестті аяқтауға сенімдісіз бе?')) return;
  try {
    await fetch(`${BACKEND}/end`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code: sessionCode })
    });
  } catch (err) {}
}

// ══════════════════════════════════════════════════════════════════
//  SSE & REALTIME
// ══════════════════════════════════════════════════════════════════
function startSSE() {
  sseSource = new EventSource(`${BACKEND}/live?code=${sessionCode}`);
  sseSource.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'snapshot') {
        data.students.forEach(s => students.set(s.studentId, s));
        updateUI(data.status, data.timeLeft);
      } 
      else if (data.type === 'update') {
        students.set(data.studentId, { studentId: data.studentId, ...data.data });
        updateUI('active', data.timeLeft);
      }
      else if (data.type === 'started') showScreen('screen-live');
      else if (data.type === 'ended') {
        sseSource.close(); clearInterval(timerInterval); showResults();
      }
    } catch(err) {}
  };
}

function updateUI(status, timeLeft) {
  if (status === 'waiting') renderLobby();
  else if (status === 'active') {
    if (!document.getElementById('screen-live').classList.contains('active')) showScreen('screen-live');
    renderLive();
    updateTimer(timeLeft);
  }
}

// ══════════════════════════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════════════════════════
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function parseName(raw) {
  if(!raw) return {name:'Белгісіз', level:''};
  const parts = raw.split('|');
  return { name: parts[0] || 'Белгісіз', level: parts[1] || '' };
}

function renderLobby() {
  const arr = Array.from(students.values());
  document.getElementById('lobby-count').textContent = arr.length + ' оқушы';
  document.getElementById('lobby-students').innerHTML = arr.map(s => {
    const { name } = parseName(s.name);
    return `<div class="l-stu"><div class="l-stu-av">${esc(name.charAt(0).toUpperCase())}</div>${esc(name)}</div>`;
  }).join('');
}

function renderLive() {
  const arr = Array.from(students.values()).sort((a,b) => (b.score||0) - (a.score||0));
  document.getElementById('live-count').textContent = arr.length + ' оқушы';
  
  document.getElementById('live-students').innerHTML = arr.map(s => {
    const id = s.studentId;
    const { name, level } = parseName(s.name);
    const score = s.score || 0, total = s.total || 0;
    const finished = s.finished === true, focused = s.focused !== false;
    const tabSw = s.tabSwitches || 0, awaySec = s.awaySeconds || 0;
    
    let flashClass = '';
    const prevT = prevTotals.get(id) || 0;
    if (total > prevT) {
      const prevS = prevTotals.get(id + '_s') || 0;
      flashClass = (score > prevS) ? 'flash-g' : 'flash-r';
    }
    prevTotals.set(id, total); prevTotals.set(id + '_s', score);

    const pct = total > 0 ? (score / total) * 100 : 0;
    const warnBadge = tabSw > 0 ? `<span class="sc-warn">👀 ${tabSw}× · ${awaySec}с</span>` : '';
    const col = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
    
    let focusHtml = finished ? `<span style="color:var(--green);font-weight:800">✓ Бітірді</span>` : 
      `<div class="sc-focus"><div class="f-dot ${focused?'on':'off'}"></div><span style="color:${focused?'var(--muted)':'var(--red)'}">${focused?'Экранда':'Сыртта'}</span></div>`;

    return `
      <div class="s-card ${flashClass}">
        <div class="sc-head">
          <div><div class="sc-name">${esc(name)} ${warnBadge}</div><div class="sc-lvl">${esc(level)}</div></div>
          <div class="sc-score" style="color:${col}">${score}</div>
        </div>
        <div class="sc-bar-wrap"><div class="sc-bar" style="width:${pct}%;background:${col}"></div></div>
        <div class="sc-foot">
          <span>${score} дұрыс / ${total - score} қате</span>
          ${focusHtml}
        </div>
      </div>
    `;
  }).join('');
}

function updateTimer(msLeft) {
  if(!msLeft || msLeft <= 0) return document.getElementById('timer').textContent = '00:00';
  const totalSec = Math.floor(msLeft / 1000);
  const m = Math.floor(totalSec / 60), s = totalSec % 60;
  const el = document.getElementById('timer');
  el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  if(m < 5) el.classList.add('danger'); else el.classList.remove('danger');
}

function showResults() {
  showScreen('screen-results');
  const arr = Array.from(students.values()).sort((a,b) => {
    const { level: la } = parseName(a.name); const { level: lb } = parseName(b.name);
    if (lb !== la) return lb.localeCompare(la);
    const pA = a.total > 0 ? a.score / a.total : 0; const pB = b.total > 0 ? b.score / b.total : 0;
    if(pB !== pA) return pB - pA;
    return (b.score||0) - (a.score||0);
  });
  
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('res-sub').textContent = arr.length + ' оқушы';
  document.getElementById('leaderboard').innerHTML = arr.map((s, i) => {
    const { name, level } = parseName(s.name);
    const score = s.score || 0, total = s.total || 0;
    const pct = total > 0 ? Math.round((score/total)*100) : 0;
    const col = pct>=70 ? 'var(--green)' : pct>=40 ? 'var(--amber)' : 'var(--red)';
    const tabSw = s.tabSwitches || 0, awaySec = s.awaySeconds || 0;
    const warnStr = tabSw > 0 ? ` &nbsp; <span class="sc-warn">👀 ${tabSw}× · ${awaySec}с</span>` : '';
    
    return `
      <div class="lb-row">
        <div class="lb-rank">${medals[i] || (i+1)}</div>
        <div class="lb-av" style="background:${col}18;color:${col}">${esc(name.charAt(0).toUpperCase())}</div>
        <div class="lb-info">
          <div class="lb-name">${esc(name)}${warnStr}</div>
          <div class="lb-stats">${esc(level)} • ${score}/${total} дұрыс (${pct}%)</div>
        </div>
        <div class="lb-score" style="color:${col}">${score}</div>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
