<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Жақшаны ашу — Оқушы</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root {
  --primary:#4f46e5;--primary-d:#3730a3;--primary-light:#ede9fe;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#d97706;--amber-light:#fef3c7;
  --bg:#f8f7ff;--bg2:#ffffff;--bg3:#e5e7eb;
  --text:#1e1b4b;--text2:#6b7280;
  --border:#e0ddf7;--radius:14px;
  --shadow:0 2px 12px rgba(79,70,229,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}

/* JOIN */
.join-card{background:var(--bg2);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.join-logo{font-size:2.6rem;margin-bottom:8px}
.join-title{font-size:1.25rem;font-weight:700;color:var(--primary);margin-bottom:4px}
.join-sub{color:var(--text2);font-size:.85rem;margin-bottom:24px}
.inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:1rem;outline:none;transition:border .15s;background:var(--bg2);color:var(--text);margin-bottom:12px}
.inp:focus{border-color:var(--primary)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d)}
.err{color:var(--red);font-size:.85rem;min-height:20px;margin-bottom:8px;text-align:center}

/* WAIT */
.wait-box{background:var(--bg2);border-radius:20px;padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.wait-icon{font-size:3rem;margin-bottom:12px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.wait-title{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:6px}
.wait-sub{color:var(--text2);font-size:.85rem}
.wait-code{margin-top:16px;background:var(--primary-light);border-radius:10px;padding:10px;font-family:monospace;font-size:1.3rem;font-weight:700;color:var(--primary);letter-spacing:.1em}

/* QUIZ SCREEN */
.quiz-wrapper{width:100%;max-width:520px;display:flex;flex-direction:column;gap:0;padding-bottom:24px}
.stats-bar{display:flex;gap:8px;margin-bottom:10px}
.stat-chip{flex:1;background:var(--bg2);border-radius:10px;padding:8px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-val{font-size:1.25rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.65rem;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.stat-val.g{color:var(--green)}
.stat-val.r{color:var(--red)}
.stat-val.a{color:var(--amber)}

.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.progress-txt{font-size:.8rem;color:var(--text2);white-space:nowrap;font-weight:600}
.progress-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#818cf8);border-radius:3px;transition:width .4s ease}

.q-card{background:var(--bg2);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.q-instr{font-size:.75rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.q-num{font-size:.72rem;background:var(--primary-light);color:var(--primary);padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:10px;font-weight:700;letter-spacing:.04em}
.q-expr{font-size:1.2rem;text-align:center;padding:10px 4px;min-height:52px;display:flex;align-items:center;justify-content:center;overflow-x:auto}
.q-expr .katex{font-size:1.15rem}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-btn{border:2px solid var(--border);border-radius:12px;padding:12px 6px;min-height:58px;cursor:pointer;background:var(--bg2);text-align:center;display:flex;align-items:center;justify-content:center;transition:border .12s,background .12s,transform .1s;overflow:hidden}
.opt-btn:active{transform:scale(.97)}
.opt-btn.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.opt-btn.correct{border-color:var(--green);background:var(--green-light)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light)}
.opt-btn.dimmed{opacity:.45}
.opt-btn .katex{font-size:.95rem}

.feedback{text-align:center;font-weight:700;padding:10px;border-radius:10px;font-size:1rem;margin-bottom:10px;display:none}
.feedback.correct{background:var(--green-light);color:var(--green);display:block}
.feedback.wrong{background:var(--red-light);color:var(--red);display:block}
.action-row{display:flex;gap:8px}
.btn-check{flex:1;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;background:var(--primary);color:#fff;transition:background .15s}
.btn-check:disabled{background:var(--bg3);color:var(--text2);cursor:default}
.btn-next{flex:1;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;background:var(--green);color:#fff;transition:background .15s;display:none}

/* RESULTS */
.results-card{background:var(--bg2);border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center}
.results-icon{font-size:3rem;margin-bottom:12px}
.results-title{font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:6px}
.results-score{font-size:3rem;font-weight:900;color:var(--green);margin:12px 0 4px}
.results-sub{color:var(--text2);font-size:.9rem;margin-bottom:20px}
.results-row{display:flex;gap:10px;justify-content:center}
.results-chip{flex:1;background:var(--bg);border-radius:10px;padding:12px;max-width:120px}
.results-chip-val{font-size:1.5rem;font-weight:800}
.results-chip-lbl{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.results-chip-val.g{color:var(--green)}
.results-chip-val.r{color:var(--red)}
.end-note{margin-top:18px;color:var(--text2);font-size:.82rem;background:var(--bg);padding:10px;border-radius:8px}

.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999}
.cc{position:absolute;width:8px;height:8px;border-radius:50%;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen active" id="s-join">
  <div class="join-card">
    <div class="join-logo">📐</div>
    <div class="join-title">Жақшаны ашу</div>
    <div class="join-sub">Өрнекті ықшамдаңыз · 84 тапсырма</div>
    <div class="err" id="join-err"></div>
    <input class="inp" id="code-inp" placeholder="Бөлме коды" maxlength="8" autocomplete="off" autocapitalize="characters">
    <input class="inp" id="name-inp" placeholder="Аты-жөніңіз" maxlength="40" autocomplete="off">
    <button class="btn btn-primary" id="join-btn" onclick="doJoin()">Кіру →</button>
  </div>
</div>

<!-- WAIT -->
<div class="screen" id="s-wait">
  <div class="wait-box">
    <div class="wait-icon">⏳</div>
    <div class="wait-title">Сабақ басталуын күтіңіз</div>
    <div class="wait-sub">Мұғалім сабақты бастағанда автоматты түрде өтесіз</div>
    <div class="wait-code" id="wait-code-display"></div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz" style="justify-content:flex-start;padding-top:16px">
  <div class="quiz-wrapper">
    <div class="stats-bar">
      <div class="stat-chip"><div class="stat-val g" id="st-correct">0</div><div class="stat-lbl">Дұрыс</div></div>
      <div class="stat-chip"><div class="stat-val r" id="st-wrong">0</div><div class="stat-lbl">Қате</div></div>
      <div class="stat-chip"><div class="stat-val a" id="st-streak">0</div><div class="stat-lbl">Серия</div></div>
    </div>
    <div class="progress-row">
      <div class="progress-txt"><span id="q-num">1</span> / 84</div>
      <div class="progress-bar"><div class="progress-fill" id="q-prog" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-instr">Жақшаны ашып, өрнекті ықшамдаңыз:</div>
      <div class="q-num" id="q-label">№ 2991</div>
      <div class="q-expr" id="q-expr"></div>
    </div>
    <div class="opts-grid" id="opts-grid"></div>
    <div class="feedback" id="feedback"></div>
    <div class="action-row">
      <button class="btn-check" id="check-btn" onclick="checkAnswer()" disabled>Тексеру</button>
      <button class="btn-next" id="next-btn" onclick="nextQuestion()">Келесі →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-results">
  <div class="confetti-wrap" id="confetti"></div>
  <div class="results-card">
    <div class="results-icon" id="res-icon">🎉</div>
    <div class="results-title">Тест аяқталды!</div>
    <div class="results-score" id="res-pct">0%</div>
    <div class="results-sub" id="res-sub">Нәтижеңіз</div>
    <div class="results-row">
      <div class="results-chip"><div class="results-chip-val g" id="res-correct">0</div><div class="results-chip-lbl">Дұрыс</div></div>
      <div class="results-chip"><div class="results-chip-val r" id="res-wrong">0</div><div class="results-chip-lbl">Қате</div></div>
      <div class="results-chip"><div class="results-chip-val" id="res-total" style="color:var(--primary)">0</div><div class="results-chip-lbl">Барлығы</div></div>
    </div>
    <div class="end-note" id="end-note">Нәтижеңіз мұғалімге жіберілді.</div>
  </div>
</div>

// ───── STATE ─────
let sessionCode = '', studentId = '', studentName = '';
let currentQ = 0;
let selectedBtn = null, answered = false;
let stats = {correct:0, wrong:0, streak:0};
let tabSwitches = 0, awaySeconds = 0, awayStart = null;
let focused = true;
let submitTimer = null;
let shuffledOpts = [];
let quizStarted = false;
let pollTimer = null;

// ───── KaTeX helper ─────
function tex(s) {
  if (typeof katex === 'undefined') return '<span>' + s + '</span>';
  try { return katex.renderToString(s, {throwOnError:false, displayMode:false}); }
  catch(e) { return '<span>' + s + '</span>'; }
}

// ───── INIT ─────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const codeParam = params.get('code');
  if (codeParam) {
    document.getElementById('code-inp').value = codeParam.toUpperCase();
    document.getElementById('code-inp').style.display = 'none';
  }
  tryReconnect();
});

function tryReconnect() {
  const params = new URLSearchParams(location.search);
  const codeParam = params.get('code');
  const saveKey = SK + (codeParam || '');
  if (!codeParam) return;
  try {
    const saved = JSON.parse(localStorage.getItem(saveKey) || 'null');
    if (saved && saved.studentId && Date.now() - saved.ts < 1800000) {
      sessionCode = codeParam.toUpperCase();
      studentId = saved.studentId;
      studentName = saved.name || '';
      stats.correct = saved.correct || 0;
      stats.wrong = saved.wrong || 0;
      stats.streak = saved.streak || 0;
      tabSwitches = saved.tabSwitches || 0;
      awaySeconds = saved.awaySeconds || 0;
      currentQ = saved.currentQ || 0;
      if (currentQ >= TOTAL_Q) { showResults(); return; }
      checkStatusAndJoin();
      return;
    }
  } catch(e) {}
}

// ───── JOIN ─────
async function doJoin() {
  const code = document.getElementById('code-inp').value.trim().toUpperCase();
  const name = document.getElementById('name-inp').value.trim();
  const errEl = document.getElementById('join-err');
  errEl.textContent = '';
  if (!code) { errEl.textContent = 'Бөлме кодын енгізіңіз'; return; }
  if (!name) { errEl.textContent = 'Атыңызды енгізіңіз'; return; }
  document.getElementById('join-btn').disabled = true;
  try {
    const res = await jFetch(`${BACKEND}/status?code=${code}`);
    if (res.status === 'not_found') { errEl.textContent = 'Бөлме табылмады'; document.getElementById('join-btn').disabled=false; return; }
    sessionCode = code;
    studentName = name;
    studentId = 'stu_' + Math.random().toString(36).slice(2,9);
    saveState();
    if (res.status === 'active') { startQuiz(); }
    else { show('s-wait'); document.getElementById('wait-code-display').textContent = sessionCode; startPoll(); }
  } catch(e) {
    errEl.textContent = 'Қосылу қатесі: ' + e.message;
    document.getElementById('join-btn').disabled = false;
  }
}

async function checkStatusAndJoin() {
  try {
    const res = await jFetch(`${BACKEND}/status?code=${sessionCode}`);
    if (res.status === 'active') { startQuiz(); }
    else if (res.status === 'ended') { showResults(); }
    else { show('s-wait'); document.getElementById('wait-code-display').textContent = sessionCode; startPoll(); }
  } catch(e) { show('s-wait'); document.getElementById('wait-code-display').textContent = sessionCode; startPoll(); }
}

// ───── POLL ─────
function startPoll() {
  clearInterval(pollTimer);
  pollTimer = setInterval(doPoll, 2000);
}

async function doPoll() {
  try {
    const res = await jFetch(`${BACKEND}/status?code=${sessionCode}`);
    if (res.status === 'active') { clearInterval(pollTimer); startQuiz(); }
    else if (res.status === 'ended') { clearInterval(pollTimer); showResults(); }
  } catch(e) {}
}

// ───── QUIZ ─────
function startQuiz() {
  quizStarted = true;
  show('s-quiz');
  updateStats();
  loadQuestion();
  startFocusTracking();
  startSubmitTimer();
}

function loadQuestion() {
  if (currentQ >= TOTAL_Q) { sendScore(true); showResults(); return; }
  const q = QUESTIONS[currentQ];
  answered = false;
  selectedBtn = null;

  // Update header
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('q-prog').style.width = ((currentQ / TOTAL_Q) * 100) + '%';
  document.getElementById('q-label').textContent = '№ ' + q.n;
  document.getElementById('q-expr').innerHTML = tex(q.q);

  // Shuffle options
  const opts = [{val:q.a, correct:true}, ...q.w.map(w => ({val:w, correct:false}))];
  shuffleArray(opts);
  shuffledOpts = opts;

  // Build grid
  const grid = document.getElementById('opts-grid');
  grid.innerHTML = '';
  opts.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'opt-btn';
    btn.dataset.correct = opt.correct;
    btn.dataset.idx = i;
    btn.innerHTML = tex(opt.val);
    btn.addEventListener('click', () => selectOpt(btn));
    grid.appendChild(btn);
  });

  // Reset UI
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('check-btn').style.display = '';
  document.getElementById('check-btn').disabled = true;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('next-btn').textContent = currentQ >= TOTAL_Q - 1 ? '🏁 Аяқтау' : 'Келесі →';
}

function selectOpt(btn) {
  if (answered) return;
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedBtn = btn;
  document.getElementById('check-btn').disabled = false;
}

function checkAnswer() {
  if (!selectedBtn || answered) return;
  answered = true;

  const isCorrect = selectedBtn.dataset.correct === 'true';

  // Style all buttons
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.style.pointerEvents = 'none';
    if (btn.dataset.correct === 'true') btn.classList.add('correct');
    else if (btn === selectedBtn) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  if (isCorrect) { stats.correct++; stats.streak++; }
  else { stats.wrong++; stats.streak = 0; }

  updateStats();
  saveState();
  sendScore(false);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Дұрыс!' : '✗ Қате!';

  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = '';
}

function nextQuestion() {
  currentQ++;
  saveState();
  if (currentQ >= TOTAL_Q) { sendScore(true); showResults(); return; }
  loadQuestion();
}

function updateStats() {
  document.getElementById('st-correct').textContent = stats.correct;
  document.getElementById('st-wrong').textContent = stats.wrong;
  document.getElementById('st-streak').textContent = stats.streak;
}

function updateProgress() {
  document.getElementById('q-prog').style.width = ((currentQ / TOTAL_Q) * 100) + '%';
}

// ───── RESULTS ─────
function showResults() {
  clearSubmitTimer();
  const total = stats.correct + stats.wrong || currentQ;
  const pct = total > 0 ? Math.round(stats.correct / total * 100) : 0;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = stats.correct;
  document.getElementById('res-wrong').textContent = stats.wrong;
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '🎉' : '📝';
  document.getElementById('res-sub').textContent = pct >= 80 ? 'Керемет нәтиже!' : pct >= 60 ? 'Жақсы жұмыс!' : 'Үздіксіз жаттық!';
  show('s-results');
  if (pct >= 50) launchConfetti();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
  for (let i = 0; i < 60; i++) {
    const cc = document.createElement('div');
    cc.className = 'cc';
    cc.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    wrap.appendChild(cc);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 5000);
}

// ───── SUBMIT ─────
function startSubmitTimer() {
  clearSubmitTimer();
  submitTimer = setInterval(() => sendScore(false), 5000);
}
function clearSubmitTimer() { if (submitTimer) { clearInterval(submitTimer); submitTimer = null; } }

async function sendScore(finished = false) {
  if (!sessionCode || !studentId) return;
  const payload = {
    code: sessionCode, studentId, name: studentName,
    score: stats.correct,
    total: stats.correct + stats.wrong,
    focused, tabSwitches,
    awaySeconds: Math.round(awaySeconds),
    finished: !!finished
  };
  try {
    const text = await fetch(`${BACKEND}/submit`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    }).then(r => r.text());
    const data = JSON.parse(text);
    if (data.status === 'ended' && !finished) showResults();
  } catch(e) {}
}

// ───── FOCUS TRACKING ─────
function startFocusTracking() {
  document.addEventListener('visibilitychange', onVisibility);
  window.addEventListener('blur', onBlur);
  window.addEventListener('focus', onFocus);
}

function onVisibility() {
  if (document.hidden) { focused = false; awayStart = Date.now(); tabSwitches++; saveState(); sendScore(); }
  else { if (awayStart) { awaySeconds += (Date.now()-awayStart)/1000; awayStart=null; } focused = true; saveState(); sendScore(); }
}
function onBlur() { if (!document.hidden) { focused=false; awayStart=Date.now(); saveState(); sendScore(); } }
function onFocus() { if (awayStart) { awaySeconds+=(Date.now()-awayStart)/1000; awayStart=null; } focused=true; saveState(); sendScore(); }

// ───── STORAGE ─────
function saveState() {
  if (!sessionCode) return;
  try {
    localStorage.setItem(SK + sessionCode, JSON.stringify({
      studentId, name:studentName, correct:stats.correct, wrong:stats.wrong, streak:stats.streak,
      tabSwitches, awaySeconds:Math.round(awaySeconds), currentQ, ts:Date.now()
    }));
  } catch(e) {}
}

// ───── UTILS ─────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffleArray(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
}
async function jFetch(url, opts) {
  const text = await fetch(url, opts).then(r=>r.text());
  return JSON.parse(text);
}
</script>
