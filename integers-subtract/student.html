<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бүтін сандар — Оқушы</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e6e9f0;
  --border:#d2d6e2;
  --text:#141826;--text2:#3b4063;--muted:#7a7f9a;
  --primary:#4338ca;--primary-light:#eef0ff;--primary-dark:#3730a3;
  --green:#059669;--green-light:#ecfdf5;--green-border:#6ee7b7;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --amber:#d97706;
  --r:14px;
  --shadow-sm:0 1px 3px rgba(20,24,38,.05);
  --shadow:0 2px 10px rgba(20,24,38,.07);
  --shadow-lg:0 8px 30px rgba(20,24,38,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden}

.screen{display:none;min-height:100vh;animation:fadeUp .3s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cfFall{from{transform:translateY(-20px) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

.container{max-width:480px;margin:0 auto;padding:1rem;padding-bottom:2rem}

/* ── JOIN ── */
.join-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.join-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.join-logo{text-align:center;margin-bottom:20px}
.join-icon{font-size:2.4rem;margin-bottom:6px}
.join-title{font-size:1.3rem;font-weight:800;margin-bottom:2px}
.join-sub{color:var(--muted);font-size:.82rem}
.field{margin-bottom:12px}
.field label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px}
.field input{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;outline:none;transition:border-color .15s;background:var(--bg)}
.field input:focus{border-color:var(--primary)}
.field input.code-input{font-family:'JetBrains Mono',monospace;font-size:1.3rem;text-align:center;letter-spacing:6px;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;touch-action:manipulation;min-height:48px}
.btn:active{transform:scale(.97)}
.btn-block{width:100%}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(67,56,202,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.err{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:10px 14px;color:var(--red);font-size:.82rem;font-weight:500;display:none;margin-bottom:10px}
.err.on{display:block}

/* ── WAIT ── */
.wait-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.wait-icon{font-size:3.5rem;margin-bottom:12px}
.wait-title{font-size:1.2rem;font-weight:800;margin-bottom:6px}
.wait-sub{color:var(--muted);font-size:.86rem;margin-bottom:16px}
.wait-name{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:4px 14px;font-size:.82rem;font-weight:700;margin-top:8px}
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:14px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* ── QUIZ ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.6rem .4rem;text-align:center;box-shadow:var(--shadow-sm)}
.stat-card.hl{background:var(--primary-light);border-color:rgba(67,56,202,.25)}
.stat-icon{font-size:1rem;margin-bottom:.15rem}
.stat-value{font-size:1.25rem;font-weight:800;color:var(--primary)}
.stat-card.g .stat-value{color:var(--green)}
.stat-card.r .stat-value{color:var(--red)}
.stat-card.a .stat-value{color:var(--amber)}
.stat-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:700}

/* ── QUIZ CARD ── */
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.5rem 1.25rem;box-shadow:var(--shadow)}
.q-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--primary-light);color:var(--primary);padding:.3rem .7rem;border-radius:16px;font-size:.72rem;font-weight:700;margin-bottom:1rem}

/* Problem display */
.problem-display{
  text-align:center;
  padding:1.25rem 1rem;
  background:linear-gradient(135deg,var(--primary-light) 0%,#f0f2ff 100%);
  border:2px solid rgba(67,56,202,.2);
  border-radius:16px;
  margin-bottom:1.25rem;
  animation:popIn .25s ease;
}
.problem-expr{
  font-family:'JetBrains Mono',monospace;
  font-size:2rem;
  font-weight:800;
  color:var(--primary-dark);
  letter-spacing:1px;
  line-height:1.3;
}

/* Answer display */
.answer-display{
  background:var(--bg);
  border:2.5px solid var(--border);
  border-radius:14px;
  padding:.85rem 1rem;
  margin-bottom:1rem;
  text-align:center;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:border-color .2s;
  position:relative;
}
.answer-display.focused{border-color:var(--primary);background:var(--primary-light)}
.answer-display.correct-anim{border-color:var(--green);background:var(--green-light)}
.answer-display.wrong-anim{border-color:var(--red);background:var(--red-light);animation:shake .4s ease}
.answer-val{
  font-family:'JetBrains Mono',monospace;
  font-size:2rem;
  font-weight:800;
  color:var(--text);
  min-width:2px;
}
.answer-cursor{
  display:inline-block;
  width:2px;height:2.2rem;
  background:var(--primary);
  margin-left:2px;
  vertical-align:middle;
  animation:pulse .8s infinite;
}
.answer-lbl{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;position:absolute;top:6px;left:10px}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
.key{
  padding:.9rem .5rem;
  border:2px solid var(--border);
  border-radius:12px;
  background:var(--bg2);
  font-family:'JetBrains Mono',monospace;
  font-size:1.2rem;
  font-weight:700;
  cursor:pointer;
  text-align:center;
  color:var(--text);
  transition:all .12s;
  touch-action:manipulation;
  min-height:52px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);
  user-select:none;
  -webkit-user-select:none;
}
.key:active{transform:scale(.92);background:var(--bg3)}
.key.key-neg{background:var(--amber-light,#fffbeb);border-color:#fcd34d;color:var(--amber)}
.key.key-comma{background:var(--primary-light);border-color:rgba(67,56,202,.3);color:var(--primary)}
.key.key-del{background:var(--red-light);border-color:var(--red-border);color:var(--red);font-size:.9rem}
.key.key-check{
  grid-column:span 4;
  background:var(--primary);
  color:#fff;
  border-color:transparent;
  box-shadow:0 2px 10px rgba(67,56,202,.3);
  font-size:1rem;
  padding:1rem;
  min-height:56px;
  font-family:inherit;
}
.key.key-check:active{background:var(--primary-dark)}
.key.key-check:disabled{opacity:.4;cursor:not-allowed}
.key.key-next{
  grid-column:span 4;
  background:var(--green);
  color:#fff;
  border-color:transparent;
  font-size:1rem;
  padding:1rem;
  min-height:56px;
  font-family:inherit;
  display:none;
}

/* Feedback */
.feedback{
  text-align:center;
  padding:.8rem;
  border-radius:12px;
  margin-bottom:.75rem;
  font-weight:700;
  font-size:.9rem;
  display:none;
  align-items:center;
  justify-content:center;
  gap:.4rem;
}
.feedback.on{display:flex}
.feedback.correct{background:var(--green-light);color:var(--green);border:1px solid var(--green)}
.feedback.wrong{background:var(--red-light);color:var(--red);border:1px solid var(--red)}

/* ── RESULTS ── */
.res-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:400px;text-align:center;box-shadow:var(--shadow-lg)}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.res-stat{background:var(--bg);border-radius:12px;padding:12px 8px}
.res-val{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.res-lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px}

.cfw{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.cfp{position:absolute;animation:cfFall linear forwards}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="cfw" id="confetti"></div>

<!-- ════ JOIN ════ -->
<div class="screen active" id="s-join">
  <div class="join-wrap">
    <div class="join-card">
      <div class="join-logo">
        <div class="join-icon">➕</div>
        <div class="join-title">Бүтін сандар амалдары</div>
        <div class="join-sub">Қосу және азайту</div>
      </div>
      <div class="err" id="join-err"></div>
      <div class="field">
        <label>Аты-жөні</label>
        <input type="text" id="sname" placeholder="Атыңызды жазыңыз" maxlength="20" autocomplete="off" autocorrect="off">
      </div>
      <div class="field" id="code-wrap">
        <label>Бөлме коды</label>
        <input type="text" id="scode" class="code-input" placeholder="------" maxlength="6" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-block" id="join-btn" style="margin-top:4px" onclick="joinQuiz()">🚀 Кіру</button>
    </div>
  </div>
</div>

<!-- ════ WAIT ════ -->
<div class="screen" id="s-wait">
  <div class="wait-wrap">
    <div class="wait-icon">✅</div>
    <div class="wait-title">Қосылдыңыз!</div>
    <div class="wait-sub">Мұғалім сабақты бастағанша күтіңіз</div>
    <div class="wait-name" id="wait-name"></div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>

<!-- ════ QUIZ ════ -->
<div class="screen" id="s-quiz">
  <div class="container">
    <div class="stats-bar">
      <div class="stat-card hl"><div class="stat-icon">📝</div><div class="stat-value" id="st-total">0</div><div class="stat-label">Барлығы</div></div>
      <div class="stat-card g"><div class="stat-icon">✓</div><div class="stat-value" id="st-correct">0</div><div class="stat-label">Дұрыс</div></div>
      <div class="stat-card r"><div class="stat-icon">✗</div><div class="stat-value" id="st-wrong">0</div><div class="stat-label">Қате</div></div>
      <div class="stat-card a"><div class="stat-icon">🔥</div><div class="stat-value" id="st-streak">0</div><div class="stat-label">Қатарынан</div></div>
    </div>
    <div class="quiz-card">
      <div class="q-badge"><span>🔢</span><span id="q-type-label">Есептеңіз</span></div>

      <div class="problem-display" id="problem-display">
        <div class="problem-expr" id="problem-expr">—</div>
      </div>

      <div class="answer-display focused" id="answer-display">
        <span class="answer-lbl">Жауап</span>
        <span class="answer-val" id="answer-val"></span><span class="answer-cursor" id="answer-cursor"></span>
      </div>

      <div class="feedback" id="feedback"></div>

      <!-- Keypad: digits 7-8-9 / 4-5-6 / 1-2-3 / neg-0-comma-del / check -->
      <div class="keypad" id="keypad">
        <div class="key" onclick="kp('7')">7</div>
        <div class="key" onclick="kp('8')">8</div>
        <div class="key" onclick="kp('9')">9</div>
        <div class="key key-del" onclick="kpDel()">⌫</div>
        <div class="key" onclick="kp('4')">4</div>
        <div class="key" onclick="kp('5')">5</div>
        <div class="key" onclick="kp('6')">6</div>
        <div class="key key-neg" onclick="kpNeg()">−</div>
        <div class="key" onclick="kp('1')">1</div>
        <div class="key" onclick="kp('2')">2</div>
        <div class="key" onclick="kp('3')">3</div>
        <div class="key key-comma" onclick="kp(',')">،</div>
        <div class="key" onclick="kp('0')" style="grid-column:span 2">0</div>
        <div class="key" onclick="kp('0')" style="display:none"></div><!-- placeholder -->
        <div class="key" onclick="kpClear()" style="font-size:.75rem;color:var(--muted)">AC</div>
        <div class="key key-check" id="check-btn" onclick="checkAnswer()">✓ Тексеру</div>
        <div class="key key-next" id="next-btn" onclick="nextQuestion()">Келесі → </div>
      </div>
    </div>
  </div>
</div>

<!-- ════ RESULTS ════ -->
<div class="screen" id="s-results">
  <div class="res-wrap">
    <div class="res-card">
      <div style="font-size:3rem;margin-bottom:8px" id="res-emoji">🏆</div>
      <div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">Тест аяқталды!</div>
      <div style="color:var(--muted);font-size:.86rem">Нәтижелеріңіз</div>
      <div class="res-stats">
        <div class="res-stat"><div class="res-val" id="res-correct" style="color:var(--green)">0</div><div class="res-lbl">Дұрыс</div></div>
        <div class="res-stat"><div class="res-val" id="res-wrong" style="color:var(--red)">0</div><div class="res-lbl">Қате</div></div>
        <div class="res-stat"><div class="res-val" id="res-pct" style="color:var(--primary)">0%</div><div class="res-lbl">Пайыз</div></div>
      </div>
      <p style="color:var(--muted);margin-top:16px;font-size:.82rem">Нәтижелер мұғалімге жіберілді ✓</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
const BACKEND = 'https://mathsabaq.online';
const STORAGE_KEY_PREFIX = 'ms_integers_';
// ═══════════════════════════════════════════════════════════════

// ── URL params ──────────────────────────────────────────
const urlParams = new URLSearchParams(location.search);
const urlCode = (urlParams.get('code') || '').toUpperCase();

// ── State ───────────────────────────────────────────────
let sessionCode = '';
let studentId = '';
let studentName = '';
let stats = { correct: 0, wrong: 0, streak: 0 };
let quiz = { answered: false, correctAnswer: '' };
let answerInput = '';
let submitInterval = null;
let statusPollInterval = null;
let quizStarted = false;

// ── Focus tracking ──────────────────────────────────────
let isFocused = true;
let tabSwitches = 0;
let awaySeconds = 0;
let awayStart = null;

function markAway() {
  if (!isFocused) return;
  isFocused = false; tabSwitches++;
  awayStart = Date.now(); saveState(); sendScore();
}
function markBack() {
  if (isFocused) return;
  isFocused = true;
  if (awayStart) { awaySeconds += Math.round((Date.now() - awayStart) / 1000); awayStart = null; }
  sendScore();
}
document.addEventListener('visibilitychange', () => { if (document.hidden) markAway(); else markBack(); });
window.addEventListener('blur', markAway);
window.addEventListener('focus', markBack);

// ── localStorage helpers ────────────────────────────────
function saveState() {
  if (!sessionCode) return;
  let currentAway = awaySeconds;
  if (awayStart) currentAway += Math.round((Date.now() - awayStart) / 1000);
  try {
    localStorage.setItem(STORAGE_KEY_PREFIX + sessionCode, JSON.stringify({
      studentId, name: studentName,
      correct: stats.correct, wrong: stats.wrong, streak: stats.streak,
      tabSwitches, awaySeconds: currentAway, ts: Date.now()
    }));
  } catch (_) {}
}
function loadState(code) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_PREFIX + code);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.ts > 3 * 60 * 60 * 1000) { localStorage.removeItem(STORAGE_KEY_PREFIX + code); return null; }
    return data;
  } catch (_) { return null; }
}
function clearState() {
  if (sessionCode) { try { localStorage.removeItem(STORAGE_KEY_PREFIX + sessionCode); } catch (_) {} }
}

// ── Helpers ──────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function spawnConfetti() {
  const w = document.getElementById('confetti'); w.innerHTML = '';
  const cols = ['#4338ca','#2563eb','#d97706','#059669','#dc2626'];
  for (let i = 0; i < 60; i++) { const e = document.createElement('div'); e.className = 'cfp'; const s = 5 + Math.random() * 9; e.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.4}s`; w.appendChild(e); }
  setTimeout(() => w.innerHTML = '', 6000);
}

// ── URL code ──────────────────────────────────────────
if (urlCode) {
  sessionCode = urlCode;
  document.getElementById('scode').value = urlCode;
  document.getElementById('code-wrap').style.display = 'none';
}

// ── Reconnection ─────────────────────────────────────
(async function tryReconnect() {
  if (!urlCode) return;
  const saved = loadState(urlCode);
  if (!saved) return;
  try {
    const res = await fetch(`${BACKEND}/status?code=${urlCode}`);
    const data = await res.json();
    if (data.status === 'not_found' || data.status === 'ended') { clearState(); return; }
    sessionCode = urlCode; studentId = saved.studentId; studentName = saved.name;
    stats = { correct: saved.correct || 0, wrong: saved.wrong || 0, streak: saved.streak || 0 };
    tabSwitches = saved.tabSwitches || 0; awaySeconds = saved.awaySeconds || 0;
    if (data.status === 'active') startQuiz();
    else if (data.status === 'waiting') showWait();
  } catch (_) {}
})();

// ══════════════════════════════════════════════════════════
//  JOIN
// ══════════════════════════════════════════════════════════
async function joinQuiz() {
  const name = document.getElementById('sname').value.trim();
  const code = (urlCode || document.getElementById('scode').value.trim()).toUpperCase();
  const errEl = document.getElementById('join-err');
  if (!name) { errEl.textContent = 'Атыңызды жазыңыз'; errEl.classList.add('on'); return; }
  if (code.length < 4) { errEl.textContent = 'Бөлме кодын енгізіңіз'; errEl.classList.add('on'); return; }
  errEl.classList.remove('on');
  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.textContent = '⏳ Қосылуда...';
  sessionCode = code; studentName = name;
  studentId = 'stu_' + Math.random().toString(36).substr(2, 9);
  try {
    const res = await fetch(`${BACKEND}/status?code=${code}`);
    const data = await res.json();
    if (data.status === 'not_found') { errEl.textContent = 'Бөлме табылмады.'; errEl.classList.add('on'); btn.disabled = false; btn.textContent = '🚀 Кіру'; return; }
    if (data.status === 'ended') { errEl.textContent = 'Бұл сабақ аяқталған.'; errEl.classList.add('on'); btn.disabled = false; btn.textContent = '🚀 Кіру'; return; }
    stats = { correct: 0, wrong: 0, streak: 0 };
    await sendScore(); saveState();
    btn.disabled = false; btn.textContent = '🚀 Кіру';
    if (data.status === 'active') startQuiz(); else showWait();
  } catch (e) {
    errEl.textContent = 'Серверге қосылу мүмкін болмады.'; errEl.classList.add('on');
    btn.disabled = false; btn.textContent = '🚀 Кіру';
  }
}
document.addEventListener('keydown', e => {
  if (document.getElementById('s-join').classList.contains('active') && e.key === 'Enter') joinQuiz();
});

// ══════════════════════════════════════════════════════════
//  WAIT
// ══════════════════════════════════════════════════════════
function showWait() {
  document.getElementById('wait-name').textContent = studentName;
  show('s-wait');
  if (statusPollInterval) clearInterval(statusPollInterval);
  statusPollInterval = setInterval(pollStatus, 2000);
}
async function pollStatus() {
  try {
    const res = await fetch(`${BACKEND}/status?code=${sessionCode}`);
    const data = await res.json();
    if (data.status === 'active') { clearInterval(statusPollInterval); statusPollInterval = null; startQuiz(); }
    else if (data.status === 'ended' || data.status === 'not_found') { clearInterval(statusPollInterval); statusPollInterval = null; showEnd(); }
  } catch (_) {}
}

// ══════════════════════════════════════════════════════════
//  START QUIZ
// ══════════════════════════════════════════════════════════
function startQuiz() {
  if (quizStarted) return;
  quizStarted = true;
  updateStats();
  show('s-quiz');
  loadQuestion();
  sendScore();
  if (submitInterval) clearInterval(submitInterval);
  submitInterval = setInterval(sendScore, 5000);
}

// ══════════════════════════════════════════════════════════
//  SEND SCORE
// ══════════════════════════════════════════════════════════
async function sendScore(finished) {
  if (!sessionCode || !studentName) return;
  let currentAway = awaySeconds;
  if (awayStart) currentAway += Math.round((Date.now() - awayStart) / 1000);
  try {
    const res = await fetch(`${BACKEND}/submit`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: sessionCode, studentId, name: studentName,
        score: stats.correct, total: stats.correct + stats.wrong,
        finished: finished === true, focused: isFocused, tabSwitches, awaySeconds: currentAway
      })
    });
    const data = await res.json();
    if (data.status === 'ended' || data.status === 'not_found') showEnd();
  } catch (_) {}
}

// ══════════════════════════════════════════════════════════
//  END
// ══════════════════════════════════════════════════════════
function showEnd() {
  if (submitInterval) { clearInterval(submitInterval); submitInterval = null; }
  if (statusPollInterval) { clearInterval(statusPollInterval); statusPollInterval = null; }
  const total = stats.correct + stats.wrong;
  const pct = total > 0 ? Math.round(stats.correct / total * 100) : 0;
  document.getElementById('res-correct').textContent = stats.correct;
  document.getElementById('res-wrong').textContent = stats.wrong;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-emoji').textContent = pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  show('s-results');
  if (pct >= 70) spawnConfetti();
  clearState();
}

function updateStats() {
  document.getElementById('st-total').textContent = stats.correct + stats.wrong;
  document.getElementById('st-correct').textContent = stats.correct;
  document.getElementById('st-wrong').textContent = stats.wrong;
  document.getElementById('st-streak').textContent = stats.streak;
}

// ══════════════════════════════════════════════════════════
//  QUESTION GENERATION
//  Patterns from the textbook image:
//  Type 1 (integer): a − b   e.g. -8−4, 6−(−5), 12−(−4), −13+10
//  Type 2 (decimal): a − b   e.g. −1,2−1,2, −3,2−(−4,1), 2,6−5,96, 0−5,2, 1−(−4,9)
// ══════════════════════════════════════════════════════════

// Random helpers
function rInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function rChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Format a number for display using Kazakh comma notation
// Returns { display: string, value: number }
function makeOperand(allowDecimal) {
  if (allowDecimal && Math.random() < 0.5) {
    // Decimal operand: 1 decimal place (like 1,2 / 5,2 / 4,9)
    // or 2 decimal places (like 5,96)
    const twoDigits = Math.random() < 0.25;
    let intPart = rInt(0, 9);
    let fracPart, value, display;
    if (twoDigits) {
      fracPart = rInt(10, 99);
      value = intPart + fracPart / 100;
      display = intPart + ',' + fracPart;
    } else {
      fracPart = rInt(1, 9);
      value = intPart + fracPart / 10;
      display = intPart + ',' + fracPart;
    }
    // Apply sign
    const neg = Math.random() < 0.4;
    return { display: neg ? '−' + display : display, value: neg ? -value : value };
  } else {
    // Integer operand
    const abs = rInt(1, 15);
    const neg = Math.random() < 0.5;
    return { display: neg ? '−' + abs : String(abs), value: neg ? -abs : abs };
  }
}

// Build a question
// Returns { exprDisplay, correctDisplay, correctValue, type }
function generateQuestion(type) {
  // Types (matching textbook):
  // 0: a − b       (both simple, result may be neg)
  // 1: a − (−b)    (subtract negative → addition)
  // 2: a + b       (one or both negative)
  // 3: 0 − b       (zero minus something)
  // 4: a − b (decimal)
  // 5: a − (−b) (decimal)

  let a, b, op, exprDisplay, result;

  if (type === 3) {
    // 0 − b  or  0 − (−b)
    a = { display: '0', value: 0 };
    const bAbs = makeOperandPositive(true);
    const subNeg = Math.random() < 0.5;
    if (subNeg) {
      // 0 − (−b)
      exprDisplay = `0 − (−${bAbs.display})`;
      result = bAbs.value;
    } else {
      // 0 − b  (b positive)
      exprDisplay = `0 − ${bAbs.display}`;
      result = -bAbs.value;
    }
  } else if (type === 0) {
    // Simple: a − b, integers
    a = makeSignedInt();
    b = makePositiveInt();
    exprDisplay = `${a.display} − ${b.display}`;
    result = a.value - b.value;
  } else if (type === 1) {
    // a − (−b): subtract negative
    a = makeSignedInt();
    b = makePositiveInt();
    exprDisplay = `${a.display} − (−${b.display})`;
    result = a.value + b.value;
  } else if (type === 2) {
    // a + b where a or b negative
    a = makeSignedInt();
    b = makeSignedInt();
    // At least one negative
    if (a.value > 0 && b.value > 0) b = { display: '−' + b.display, value: -b.value, displayForAdd: '(−' + b.display + ')' };
    exprDisplay = `${a.display} + ${b.displayForAdd}`;
    result = a.value + b.value;
  } else if (type === 4) {
    // Decimal: a − b
    a = makeSignedDecimal();
    b = makePositiveDecimal();
    exprDisplay = `${a.display} − ${b.display}`;
    result = roundDecimal(a.value - b.value);
  } else if (type === 5) {
    // Decimal: a − (−b)
    a = makeSignedDecimal();
    b = makePositiveDecimal();
    exprDisplay = `${a.display} − (−${b.display})`;
    result = roundDecimal(a.value + b.value);
  }

  const correctDisplay = formatAnswer(result);
  return { exprDisplay, correctDisplay, correctValue: result };
}

function makeSignedInt() {
  const abs = rInt(1, 15);
  const neg = Math.random() < 0.5;
  const val = neg ? -abs : abs;
  return { display: neg ? '−' + abs : String(abs), value: val, displayForAdd: neg ? '(−' + abs + ')' : String(abs) };
}
function makePositiveInt() {
  const abs = rInt(1, 13);
  return { display: String(abs), value: abs };
}
function makeSignedDecimal() {
  const intP = rInt(0, 9);
  const fracP = rInt(1, 9);
  const val = intP + fracP / 10;
  const neg = Math.random() < 0.4;
  return {
    display: neg ? '−' + intP + ',' + fracP : intP + ',' + fracP,
    value: neg ? -val : val
  };
}
function makePositiveDecimal() {
  // Either 1 decimal: x,y or 2 decimals: x,yz
  if (Math.random() < 0.25) {
    const intP = rInt(1, 5);
    const fracP = rInt(10, 99);
    return { display: intP + ',' + fracP, value: intP + fracP / 100 };
  }
  const intP = rInt(0, 9);
  const fracP = rInt(1, 9);
  return { display: intP + ',' + fracP, value: intP + fracP / 10 };
}
function makeOperandPositive(allowDecimal) {
  if (allowDecimal && Math.random() < 0.5) return makePositiveDecimal();
  return makePositiveInt();
}
function roundDecimal(v) {
  return Math.round(v * 100) / 100;
}

// Format answer for display (Kazakh comma, negative sign)
function formatAnswer(v) {
  if (v === 0) return '0';
  const neg = v < 0;
  const abs = Math.abs(v);
  // Check if decimal
  let s;
  if (Number.isInteger(abs)) {
    s = String(abs);
  } else {
    // Convert to string with comma
    s = abs.toFixed(abs < 10 ? (abs * 10 % 1 !== 0 ? 2 : 1) : 2);
    // Remove trailing zeros
    s = s.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
    s = s.replace('.', ',');
  }
  return neg ? '−' + s : s;
}

// Pick random type weighted like the textbook distribution
const TYPES = [0,0,0,1,1,1,2,2,3,4,4,5,5];

let currentQuestion = null;

function loadQuestion() {
  quiz = { answered: false, correctAnswer: '' };
  answerInput = '';
  updateAnswerDisplay();

  const type = rChoice(TYPES);
  currentQuestion = generateQuestion(type);

  document.getElementById('problem-expr').textContent = currentQuestion.exprDisplay;
  // Refresh animation
  const pd = document.getElementById('problem-display');
  pd.style.animation = 'none'; pd.offsetHeight; pd.style.animation = '';

  document.getElementById('feedback').classList.remove('on', 'correct', 'wrong');
  document.getElementById('check-btn').style.display = 'flex';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('answer-display').className = 'answer-display focused';
}

// ══════════════════════════════════════════════════════════
//  KEYPAD
// ══════════════════════════════════════════════════════════
function kp(ch) {
  if (quiz.answered) return;
  // Rules:
  if (ch === ',' && answerInput.includes(',')) return; // only one comma
  if (ch === '0' && answerInput === '−') { answerInput += '0'; updateAnswerDisplay(); return; } // −0 → allow for building
  if (ch === '0' && answerInput === '0') return; // no leading zeros
  if (ch !== ',' && ch !== '−' && answerInput === '0') { answerInput = ch; updateAnswerDisplay(); return; } // replace leading 0
  if (answerInput.length >= 8) return; // max length
  answerInput += ch;
  updateAnswerDisplay();
}
function kpNeg() {
  if (quiz.answered) return;
  if (answerInput === '' || answerInput === '0') { answerInput = '−'; }
  else if (answerInput.startsWith('−')) { answerInput = answerInput.slice(1); }
  else { answerInput = '−' + answerInput; }
  updateAnswerDisplay();
}
function kpDel() {
  if (quiz.answered) return;
  answerInput = answerInput.slice(0, -1);
  updateAnswerDisplay();
}
function kpClear() {
  if (quiz.answered) return;
  answerInput = '';
  updateAnswerDisplay();
}
function updateAnswerDisplay() {
  document.getElementById('answer-val').textContent = answerInput;
}

// ══════════════════════════════════════════════════════════
//  CHECK ANSWER
// ══════════════════════════════════════════════════════════
function checkAnswer() {
  if (quiz.answered) return;
  if (!answerInput || answerInput === '−') return; // nothing entered

  quiz.answered = true;
  const correct = currentQuestion.correctDisplay;

  // Normalize comparison: both use comma, −
  const userNorm = answerInput.trim();
  const isCorrect = userNorm === correct;

  const fb = document.getElementById('feedback');
  const ad = document.getElementById('answer-display');

  if (isCorrect) {
    stats.correct++; stats.streak++;
    fb.className = 'feedback on correct';
    fb.textContent = '✓ Дұрыс!';
    ad.className = 'answer-display correct-anim';
  } else {
    stats.wrong++; stats.streak = 0;
    fb.className = 'feedback on wrong';
    fb.innerHTML = `✗ Қате! Дұрыс жауап: <strong>${correct}</strong>`;
    ad.className = 'answer-display wrong-anim';
    setTimeout(() => ad.classList.remove('wrong-anim'), 500);
  }

  updateStats(); saveState(); sendScore();
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'flex';
}

function nextQuestion() { loadQuestion(); }

// Physical keyboard support
document.addEventListener('keydown', e => {
  if (!document.getElementById('s-quiz').classList.contains('active')) return;
  if (quiz.answered) {
    if (e.key === 'Enter') nextQuestion();
    return;
  }
  if (e.key >= '0' && e.key <= '9') kp(e.key);
  else if (e.key === '-') kpNeg();
  else if (e.key === ',' || e.key === '.') kp(',');
  else if (e.key === 'Backspace') kpDel();
  else if (e.key === 'Enter') checkAnswer();
});
</script>
