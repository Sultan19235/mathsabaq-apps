<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Арифметикалық орта, Мода, Медиана, Комбинаторика — Оқушы</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e6e9f0;
  --border:#d2d6e2;
  --text:#141826;--text2:#3b4063;--muted:#7a7f9a;
  --primary:#4338ca;--primary-light:#eef0ff;--primary-dark:#3730a3;
  --green:#059669;--green-light:#ecfdf5;--green-border:#6ee7b7;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --amber:#d97706;--amber-light:#fffbeb;
  --r:14px;
  --shadow-sm:0 1px 3px rgba(20,24,38,.05);
  --shadow:0 2px 10px rgba(20,24,38,.07);
  --shadow-lg:0 8px 30px rgba(20,24,38,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden}

.screen{display:none;min-height:100vh;animation:fadeUp .3s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cfFall{from{transform:translateY(-20px) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}

.container{max-width:520px;margin:0 auto;padding:1rem;padding-bottom:2rem}

/* ── JOIN ── */
.join-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.join-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.join-logo{text-align:center;margin-bottom:20px}
.join-icon{font-size:2.4rem;margin-bottom:6px}
.join-title{font-size:1.3rem;font-weight:800;margin-bottom:2px}
.join-sub{color:var(--muted);font-size:.82rem}
.field{margin-bottom:12px}
.field label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px}
.field input{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;outline:none;transition:border-color .15s;background:var(--bg)}
.field input:focus{border-color:var(--primary)}
.field input.code-input{font-family:'JetBrains Mono',monospace;font-size:1.3rem;text-align:center;letter-spacing:6px;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;touch-action:manipulation;min-height:48px}
.btn:active{transform:scale(.97)}
.btn-block{width:100%}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(67,56,202,.3)}
.btn-green{background:var(--green);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.err{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:10px 14px;color:var(--red);font-size:.82rem;font-weight:500;display:none;margin-bottom:10px}
.err.on{display:block}

/* ── WAIT ── */
.wait-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.wait-icon{font-size:3.5rem;margin-bottom:12px}
.wait-title{font-size:1.2rem;font-weight:800;margin-bottom:6px}
.wait-sub{color:var(--muted);font-size:.86rem;margin-bottom:16px}
.wait-name{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:4px 14px;font-size:.82rem;font-weight:700;margin-top:8px}
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:14px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* ── QUIZ ── */
.level-bar{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.7rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm)}
.level-badge{display:flex;align-items:center;gap:6px;font-weight:800;font-size:.9rem;color:var(--primary)}
.level-progress{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;color:var(--muted)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.5rem .4rem;text-align:center;box-shadow:var(--shadow-sm)}
.stat-card.hl{background:var(--primary-light);border-color:rgba(67,56,202,.25)}
.stat-icon{font-size:.9rem;margin-bottom:.1rem}
.stat-value{font-size:1.15rem;font-weight:800;color:var(--primary)}
.stat-card.g .stat-value{color:var(--green)}
.stat-card.r .stat-value{color:var(--red)}
.stat-card.a .stat-value{color:var(--amber)}
.stat-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;font-weight:700}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.25rem;box-shadow:var(--shadow)}
.q-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--primary-light);color:var(--primary);padding:.3rem .7rem;border-radius:16px;font-size:.72rem;font-weight:700;margin-bottom:.75rem}
.q-text{font-size:1rem;font-weight:600;line-height:1.55;margin-bottom:1rem;color:var(--text)}
.q-text .katex{font-size:1.05em}
.opts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt-btn{display:flex;align-items:center;gap:10px;padding:13px 14px;border:2.5px solid var(--border);border-radius:14px;background:var(--bg2);cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;font-size:.92rem;font-weight:600;color:var(--text);touch-action:manipulation;width:100%;min-height:48px}
.opt-btn:active{transform:scale(.98)}
.opt-btn .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;flex-shrink:0;transition:all .2s}
.opt-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.opt-btn.selected .opt-letter{background:var(--primary);color:#fff}
.opt-btn.correct{border-color:var(--green);background:var(--green-light)}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light)}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff}
.opt-btn .opt-text{flex:1;line-height:1.4}
.opt-btn .opt-text .katex{font-size:1em}
.feedback{padding:.85rem;border-radius:12px;margin-bottom:.75rem;font-weight:700;font-size:.9rem;line-height:1.5}
.feedback.correct{background:var(--green-light);color:var(--green);border:1px solid var(--green)}
.feedback.wrong{background:var(--red-light);color:var(--red);border:1px solid var(--red)}
.explanation-box{background:#f8f9ff;border:1px solid rgba(67,56,202,.15);border-radius:12px;padding:.85rem;margin-bottom:.75rem;font-size:.84rem;line-height:1.7;color:var(--text2)}
.explanation-box .katex{font-size:.95em}
.btn-group{display:flex;gap:.6rem;justify-content:center;align-items:center;flex-wrap:wrap}
.hidden{display:none!important}

/* ── LEVEL COMPLETE ── */
.level-result{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem 1.5rem;text-align:center;box-shadow:var(--shadow-lg);max-width:400px;width:100%;margin:0 auto}
.level-result .emoji{font-size:3rem;margin-bottom:8px}
.level-result .title{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.level-result .sub{color:var(--muted);font-size:.84rem;margin-bottom:16px}
.level-result .stat-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.level-result .stat-box{background:var(--bg);border-radius:12px;padding:10px 16px;text-align:center}
.level-result .stat-box .val{font-size:1.3rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.level-result .stat-box .lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px}

/* ── RESULTS ── */
.res-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:420px;text-align:center;box-shadow:var(--shadow-lg)}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.res-stat{background:var(--bg);border-radius:12px;padding:12px 8px}
.res-val{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.res-lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px}
.levels-summary{text-align:left;margin:12px 0;font-size:.82rem}
.levels-summary .lv-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3)}
.levels-summary .lv-row:last-child{border-bottom:none}
.levels-summary .lv-badge{font-weight:700;width:80px;flex-shrink:0}
.levels-summary .lv-status{flex:1;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.76rem}

.cfw{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.cfp{position:absolute;animation:cfFall linear forwards}
</style>
</head>
<body>
<div class="cfw" id="confetti"></div>

<!-- ════ JOIN ════ -->
<div class="screen active" id="s-join">
  <div class="join-wrap">
    <div class="join-card">
      <div class="join-logo">
        <div class="join-icon">🧮</div>
        <div class="join-title">Арифметикалық орта, Мода, Медиана</div>
        <div class="join-sub">Комбинаторика · 6-сынып · 7 деңгей</div>
      </div>
      <div class="err" id="join-err"></div>
      <div class="field">
        <label>Аты-жөні</label>
        <input type="text" id="sname" placeholder="Атыңызды жазыңыз" maxlength="20" autocomplete="off" autocorrect="off">
      </div>
      <div class="field" id="code-wrap">
        <label>Бөлме коды</label>
        <input type="text" id="scode" class="code-input" placeholder="------" maxlength="6" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-block" id="join-btn" style="margin-top:4px" onclick="joinQuiz()">🚀 Кіру</button>
    </div>
  </div>
</div>

<!-- ════ WAIT ════ -->
<div class="screen" id="s-wait">
  <div class="wait-wrap">
    <div class="wait-icon">✅</div>
    <div class="wait-title">Қосылдыңыз!</div>
    <div class="wait-sub">Мұғалім сабақты бастағанша күтіңіз</div>
    <div class="wait-name" id="wait-name"></div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>

<!-- ════ QUIZ ════ -->
<div class="screen" id="s-quiz">
  <div class="container">
    <div class="level-bar">
      <div class="level-badge">🏆 <span id="lv-label">Деңгей 1</span></div>
      <div class="level-progress" id="lv-progress">0 / 10</div>
    </div>
    <div class="stats-bar">
      <div class="stat-card hl"><div class="stat-icon">📊</div><div class="stat-value" id="st-total">0</div><div class="stat-label">Жауап</div></div>
      <div class="stat-card g"><div class="stat-icon">✓</div><div class="stat-value" id="st-correct">0</div><div class="stat-label">Дұрыс</div></div>
      <div class="stat-card r"><div class="stat-icon">✗</div><div class="stat-value" id="st-wrong">0</div><div class="stat-label">Қате</div></div>
      <div class="stat-card a"><div class="stat-icon">🔥</div><div class="stat-value" id="st-streak">0</div><div class="stat-label">Қатарынан</div></div>
    </div>
    <div class="quiz-card" id="quiz-card"></div>
    <div id="level-result-area" class="hidden" style="margin-top:1rem"></div>
  </div>
</div>

<!-- ════ RESULTS ════ -->
<div class="screen" id="s-results">
  <div class="res-wrap">
    <div class="res-card">
      <div style="font-size:3rem;margin-bottom:8px" id="res-emoji">🏆</div>
      <div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">Тест аяқталды!</div>
      <div style="color:var(--muted);font-size:.86rem">Нәтижелеріңіз</div>
      <div class="res-stats">
        <div class="res-stat"><div class="res-val" id="res-correct" style="color:var(--green)">0</div><div class="res-lbl">Дұрыс</div></div>
        <div class="res-stat"><div class="res-val" id="res-wrong" style="color:var(--red)">0</div><div class="res-lbl">Қате</div></div>
        <div class="res-stat"><div class="res-val" id="res-pct" style="color:var(--primary)">0%</div><div class="res-lbl">Пайыз</div></div>
      </div>
      <div class="levels-summary" id="levels-summary"></div>
      <p style="color:var(--muted);margin-top:16px;font-size:.82rem">Нәтижелер мұғалімге жіберілді ✓</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
const BACKEND = 'https://mathsabaq.online';
const STORAGE_KEY_PREFIX = 'ms_mathmixed6_';
const TOTAL_LEVELS = 7;
const Q_PER_LEVEL = 10;
const PASS_PCT = 70; // need 7/10 correct
// ═══════════════════════════════════════════════════════════════

const tex = s => {
  if (!s) return '';
  return s.replace(/\$([^$]+)\$/g, (_, m) => katex.renderToString(m, { throwOnError: false }));
};

const urlParams = new URLSearchParams(location.search);
const urlCode = (urlParams.get('code') || '').toUpperCase();

// ── State ───────────────────────────────────────────────
let sessionCode = '';
let studentId = '';
let studentName = '';
let stats = { correct: 0, wrong: 0, streak: 0 };
let currentLevel = 1;
let levelCorrect = 0;
let levelWrong = 0;
let levelQuestions = [];
let levelQIndex = 0;
let allUsedKeys = {};
let levelResults = {};
let quiz = { selected: null, answered: false };
let submitInterval = null;
let statusPollInterval = null;
let quizStarted = false;
let sessionEnded = false;

// ── Focus tracking ──────────────────────────────────────
let isFocused = true;
let tabSwitches = 0;
let awaySeconds = 0;
let awayStart = null;

function markAway() {
  if (!isFocused) return;
  isFocused = false;
  tabSwitches++;
  awayStart = Date.now();
  saveState();
  sendScore();
}
function markBack() {
  if (isFocused) return;
  isFocused = true;
  if (awayStart) {
    awaySeconds += Math.round((Date.now() - awayStart) / 1000);
    awayStart = null;
  }
  sendScore();
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) markAway(); else markBack();
});
window.addEventListener('blur', markAway);
window.addEventListener('focus', markBack);

// ── localStorage ────────────────────────────────────────
function saveState() {
  if (!sessionCode) return;
  let currentAway = awaySeconds;
  if (awayStart) currentAway += Math.round((Date.now() - awayStart) / 1000);
  const usedKeysObj = {};
  for (const [lv, st] of Object.entries(allUsedKeys)) usedKeysObj[lv] = Array.from(st);
  try {
    localStorage.setItem(STORAGE_KEY_PREFIX + sessionCode, JSON.stringify({
      studentId, name: studentName,
      correct: stats.correct, wrong: stats.wrong, streak: stats.streak,
      tabSwitches, awaySeconds: currentAway,
      currentLevel, levelCorrect, levelWrong,
      levelQuestions, levelQIndex,
      allUsedKeys: usedKeysObj, levelResults,
      ts: Date.now()
    }));
  } catch (_) {}
}
function loadState(code) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_PREFIX + code);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.ts > 3 * 60 * 60 * 1000) { localStorage.removeItem(STORAGE_KEY_PREFIX + code); return null; }
    return data;
  } catch (_) { return null; }
}
function clearState() {
  if (sessionCode) try { localStorage.removeItem(STORAGE_KEY_PREFIX + sessionCode); } catch (_) {}
}

// ── Helpers ──────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function shuffleArray(arr) { const r = [...arr]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
function spawnConfetti() {
  const w = document.getElementById('confetti'); w.innerHTML = '';
  const cols = ['#4338ca','#2563eb','#d97706','#059669','#dc2626'];
  for (let i = 0; i < 60; i++) { const e = document.createElement('div'); e.className = 'cfp'; const s = 5 + Math.random() * 9; e.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.4}s`; w.appendChild(e); }
  setTimeout(() => w.innerHTML = '', 6000);
}

if (urlCode) {
  sessionCode = urlCode;
  document.getElementById('scode').value = urlCode;
  document.getElementById('code-wrap').style.display = 'none';
}

// ══════════════════════════════════════════════════════════
//  QUESTION BANK — 7 levels x 10 questions
//  Includes decimals, fractions, detailed explanations
// ══════════════════════════════════════════════════════════
const QUESTION_BANK = {
1: [
  { q:"$2$, $4$ және $6$ сандарының арифметикалық ортасын табыңыз.", opts:["$3$","$4$","$5$","$6$"], ans:1, exp:"Алдымен сандарды қосамыз: $2 + 4 + 6 = 12$. Содан кейін сандардың санына бөлеміз. Бізде 3 сан бар, сондықтан $12 : 3 = 4$. Жауабы: $4$." },
  { q:"$10$ және $20$ сандарының арифметикалық ортасы неге тең?", opts:["$10$","$15$","$20$","$30$"], ans:1, exp:"Екі санды қосамыз: $10 + 20 = 30$. Сандар саны 2, сондықтан $30 : 2 = 15$. Яғни ортасы $15$." },
  { q:"Берілген қатардың модасын табыңыз: $3, 5, 5, 7$.", opts:["$3$","$5$","$7$","Мода жоқ"], ans:1, exp:"Мода дегеніміз — қатарда ең көп қайталанатын сан. $3$ бір рет, $5$ екі рет, $7$ бір рет кездеседі. $5$ екі рет кездеседі — ол ең көбі. Сондықтан мода $= 5$." },
  { q:"$1, 1, 2, 3, 4, 4, 4$ қатарының модасы қандай?", opts:["$1$","$2$","$3$","$4$"], ans:3, exp:"Санап шығамыз: $1$ — 2 рет, $2$ — 1 рет, $3$ — 1 рет, $4$ — 3 рет. Ең көп қайталанғаны $4$ (3 рет). Мода $= 4$." },
  { q:"$1, 5, 9$ сандарының медианасын табыңыз.", opts:["$1$","$5$","$9$","$15$"], ans:1, exp:"Сандар өсу ретімен: $1, 5, 9$. Бізде 3 сан бар — тақ сан. Ортасындағы (2-ші) сан — $5$. Медиана $= 5$." },
  { q:"$2, 4, 6, 8$ сандарының медианасын табыңыз.", opts:["$4$","$5$","$6$","$10$"], ans:1, exp:"Бізде 4 сан бар — жұп сан. Ортадағы екі санды аламыз: $4$ пен $6$. Оларды қосып 2-ге бөлеміз: $(4 + 6) : 2 = 10 : 2 = 5$. Медиана $= 5$." },
  { q:"Асқардың $2$ жейдесі және $3$ шалбары бар. Ол неше үлгі кие алады?", opts:["$5$","$6$","$8$","$9$"], ans:1, exp:"Әрбір жейдеге 3 шалбар сәйкес келеді. 1-ші жейде + 3 шалбар = 3 нұсқа. 2-ші жейде + 3 шалбар = тағы 3 нұсқа. Барлығы $3 + 3 = 6$ нұсқа." },

// ── Dynamic variation generators ────────────────────────
function generateVariation(level) {
  // Generate arithmetic mean questions with random numbers
  const gens = [
    () => { // 2 numbers mean
      const a = 2+Math.floor(Math.random()*20)*2, b = a+4+Math.floor(Math.random()*10)*2;
      const avg = (a+b)/2;
      const wrongs = [avg-2, avg+3, a+b].filter(v => v !== avg && v > 0);
      if (wrongs.length < 3) return null;
      const opts = shuffleArray([{v:avg,c:true},...wrongs.slice(0,3).map(v=>({v,c:false}))]);
      const ai = opts.findIndex(o=>o.c);
      return { q:`$${a}$ және $${b}$ сандарының арифметикалық ортасын табыңыз.`, opts:opts.map(o=>`$${o.v}$`), ans:ai, exp:`Қосамыз: $${a} + ${b} = ${a+b}$. Сандар саны 2. Бөлеміз: $${a+b} : 2 = ${avg}$.` };
    },
    () => { // 3 numbers mean
      const a = 2+Math.floor(Math.random()*10), b = a+3, c = b+3;
      const sum = a+b+c;
      if (sum % 3 !== 0) return null;
      const avg = sum/3;
      const wrongs = [avg-1, avg+2, avg+3].filter(v => v !== avg);
      const opts = shuffleArray([{v:avg,c:true},...wrongs.slice(0,3).map(v=>({v,c:false}))]);
      const ai = opts.findIndex(o=>o.c);
      return { q:`$${a}$, $${b}$ және $${c}$ сандарының арифметикалық ортасын табыңыз.`, opts:opts.map(o=>`$${o.v}$`), ans:ai, exp:`Қосамыз: $${a} + ${b} + ${c} = ${sum}$. Сандар саны 3. Бөлеміз: $${sum} : 3 = ${avg}$.` };
    },
    () => { // find X in mean
      const a = 4+Math.floor(Math.random()*12), target = a + 2 + Math.floor(Math.random()*6);
      const x = target * 2 - a;
      if (x <= 0 || x === a) return null;
      const wrongs = [x-2, x+2, x+4].filter(v => v !== x && v > 0);
      if (wrongs.length < 3) return null;
      const opts = shuffleArray([{v:x,c:true},...wrongs.slice(0,3).map(v=>({v,c:false}))]);
      const ai = opts.findIndex(o=>o.c);
      return { q:`$${a}$ және $X$ сандарының ортасы $${target}$. $X$ неге тең?`, opts:opts.map(o=>`$${o.v}$`), ans:ai, exp:`$(${a} + X) : 2 = ${target}$. Осыдан $${a} + X = ${target*2}$. $X = ${target*2} - ${a} = ${x}$.` };
    }
  ];
  for (let i = 0; i < 50; i++) {
    const gen = gens[Math.floor(Math.random() * gens.length)];
    const r = gen();
    if (r) { r._key = 'gen_' + level + '_' + Math.random().toString(36).substr(2,8); return r; }
  }
  return null;
}

function pickQuestionsForLevel(level) {
  const bank = QUESTION_BANK[level] || [];
  if (!allUsedKeys[level]) allUsedKeys[level] = new Set();
  const used = allUsedKeys[level];
  let available = bank.map((q, i) => ({ ...q, _key: 'b' + level + '_' + i })).filter(q => !used.has(q._key));
  let selected = [];

  if (available.length >= Q_PER_LEVEL) {
    selected = shuffleArray(available).slice(0, Q_PER_LEVEL);
  } else {
    selected = [...available];
    let needed = Q_PER_LEVEL - selected.length;
    let attempts = 0;
    while (needed > 0 && attempts < 100) {
      const v = generateVariation(level);
      if (v && !used.has(v._key)) { selected.push(v); needed--; }
      attempts++;
    }
    if (needed > 0) {
      const recycled = shuffleArray([...bank]).slice(0, needed).map((q, i) => ({ ...q, _key: 'r' + Date.now() + '_' + i }));
      selected.push(...recycled);
    }
  }
  selected.forEach(q => used.add(q._key));
  return selected.map(q => {
    const shuffled = shuffleArray(q.opts.map((o, i) => ({ text: o, isCorrect: i === q.ans })));
    return { ...q, opts: shuffled.map(o => o.text), ans: shuffled.findIndex(o => o.isCorrect) };
  });
}

(async function tryReconnect() {
  if (!urlCode) return;
  const saved = loadState(urlCode);
  if (!saved) return;
  try {
    const res = await fetch(`${BACKEND}/status?code=${urlCode}`);
    const data = await res.json();
    if (data.status === 'not_found' || data.status === 'ended') { clearState(); return; }
    sessionCode = urlCode;
    studentId = saved.studentId;
    studentName = saved.name;
    stats = { correct: saved.correct||0, wrong: saved.wrong||0, streak: saved.streak||0 };
    tabSwitches = saved.tabSwitches||0;
    awaySeconds = saved.awaySeconds||0;
    currentLevel = saved.currentLevel||1;
    levelCorrect = saved.levelCorrect||0;
    levelWrong = saved.levelWrong||0;
    levelResults = saved.levelResults||{};
    if (saved.allUsedKeys) for (const [lv, arr] of Object.entries(saved.allUsedKeys)) allUsedKeys[lv] = new Set(arr);
    if (saved.levelQuestions?.length > 0 && saved.levelQIndex < saved.levelQuestions.length) {
      levelQuestions = saved.levelQuestions;
      levelQIndex = saved.levelQIndex;
    } else { levelQuestions = []; levelQIndex = 0; }
    if (data.status === 'active') startQuiz();
    else if (data.status === 'waiting') showWait();
  } catch (_) {}
})();

async function joinQuiz() {
  const name = document.getElementById('sname').value.trim();
  const code = (urlCode || document.getElementById('scode').value.trim()).toUpperCase();
  const errEl = document.getElementById('join-err');
  if (!name) { errEl.textContent = 'Атыңызды жазыңыз'; errEl.classList.add('on'); return; }
  if (code.length < 4) { errEl.textContent = 'Бөлме кодын енгізіңіз'; errEl.classList.add('on'); return; }
  errEl.classList.remove('on');
  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.textContent = '⏳ Қосылуда...';
  sessionCode = code; studentName = name;
  studentId = 'stu_' + Math.random().toString(36).substr(2, 9);
  try {
    const res = await fetch(`${BACKEND}/status?code=${code}`);
    const data = await res.json();
    if (data.status === 'not_found') { errEl.textContent = 'Бөлме табылмады.'; errEl.classList.add('on'); btn.disabled = false; btn.textContent = '🚀 Кіру'; return; }
    if (data.status === 'ended') { errEl.textContent = 'Бұл сабақ аяқталған.'; errEl.classList.add('on'); btn.disabled = false; btn.textContent = '🚀 Кіру'; return; }
    stats = { correct:0, wrong:0, streak:0 }; currentLevel = 1; levelCorrect = 0; levelWrong = 0;
    levelResults = {}; allUsedKeys = {}; levelQuestions = []; levelQIndex = 0;
    await sendScore(); saveState();
    btn.disabled = false; btn.textContent = '🚀 Кіру';
    if (data.status === 'active') startQuiz(); else showWait();
  } catch (e) { errEl.textContent = 'Серверге қосылу мүмкін болмады.'; errEl.classList.add('on'); btn.disabled = false; btn.textContent = '🚀 Кіру'; }
}
document.addEventListener('keydown', e => { if (document.getElementById('s-join').classList.contains('active') && e.key === 'Enter') joinQuiz(); });

function showWait() {
  document.getElementById('wait-name').textContent = studentName;
  show('s-wait');
  if (statusPollInterval) clearInterval(statusPollInterval);
  statusPollInterval = setInterval(pollStatus, 2000);
}
async function pollStatus() {
  try {
    const res = await fetch(`${BACKEND}/status?code=${sessionCode}`);
    const data = await res.json();
    if (data.status === 'active') { clearInterval(statusPollInterval); statusPollInterval = null; startQuiz(); }
    else if (data.status === 'ended' || data.status === 'not_found') { clearInterval(statusPollInterval); statusPollInterval = null; showEnd(); }
  } catch (_) {}
}

function startQuiz() {
  if (quizStarted) return;
  quizStarted = true; sessionEnded = false;
  updateStats(); show('s-quiz');
  if (levelQuestions.length > 0 && levelQIndex < levelQuestions.length) renderQuestion();
  else startLevel(currentLevel);
  sendScore();
  if (submitInterval) clearInterval(submitInterval);
  submitInterval = setInterval(sendScore, 5000);
}

function startLevel(level) {
  currentLevel = level; levelCorrect = 0; levelWrong = 0; levelQIndex = 0;
  levelQuestions = pickQuestionsForLevel(level);
  document.getElementById('level-result-area').classList.add('hidden');
  document.getElementById('quiz-card').classList.remove('hidden');
  updateLevelBar(); renderQuestion(); saveState();
}

function updateLevelBar() {
  const names = ['Өте оңай','Оңай','Орташа','Қиын','Өте қиын','Логика','Олимпиадалық'];
  document.getElementById('lv-label').textContent = `Деңгей ${currentLevel} — ${names[currentLevel-1]||''}`;
  document.getElementById('lv-progress').textContent = `${levelQIndex} / ${Q_PER_LEVEL}`;
}

function renderQuestion() {
  if (sessionEnded) return;
  const q = levelQuestions[levelQIndex]; if (!q) return;
  quiz = { selected: null, answered: false }; updateLevelBar();
  const labels = ['A','B','C','D'];
  document.getElementById('quiz-card').innerHTML = `
    <div class="q-badge"><span>📝</span><span>Деңгей ${currentLevel} · Сұрақ ${levelQIndex+1}/${Q_PER_LEVEL}</span></div>
    <div class="q-text">${tex(q.q)}</div>
    <div class="opts-list" id="opts-list">${q.opts.map((o,i) => `
      <button class="opt-btn" data-idx="${i}" onclick="selectOpt(${i})">
        <span class="opt-letter">${labels[i]}</span>
        <span class="opt-text">${tex(o)}</span>
      </button>`).join('')}</div>
    <div class="feedback hidden" id="feedback"></div>
    <div class="explanation-box hidden" id="explanation"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()" disabled>✓ Тексеру</button>
      <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">Келесі →</button>
    </div>`;
  document.getElementById('quiz-card').classList.remove('hidden');
  document.getElementById('level-result-area').classList.add('hidden');
}

function selectOpt(idx) { if (quiz.answered) return; document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected')); document.querySelector(`.opt-btn[data-idx="${idx}"]`).classList.add('selected'); quiz.selected = idx; document.getElementById('check-btn').disabled = false; }

function checkAnswer() {
  if (quiz.selected === null || quiz.answered) return;
  quiz.answered = true;
  const q = levelQuestions[levelQIndex];
  const isCorrect = quiz.selected === q.ans;
  document.querySelectorAll('.opt-btn').forEach((b,i) => { b.style.pointerEvents='none'; if (i===q.ans) b.classList.add('correct'); else if (i===quiz.selected&&!isCorrect) b.classList.add('wrong'); });
  const fb = document.getElementById('feedback'); fb.classList.remove('hidden','correct','wrong');
  if (isCorrect) { stats.correct++; stats.streak++; levelCorrect++; fb.classList.add('correct'); fb.innerHTML='✓ Дұрыс!'; }
  else { stats.wrong++; stats.streak=0; levelWrong++; fb.classList.add('wrong'); fb.innerHTML='✗ Қате!'; }
  document.getElementById('explanation').innerHTML = `<b>Түсіндірме:</b> ${tex(q.exp)}`;
  document.getElementById('explanation').classList.remove('hidden');
  updateStats(); saveState(); sendScore();
  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
  levelQIndex++; saveState();
  if (levelQIndex >= Q_PER_LEVEL) showLevelResult(); else renderQuestion();
}

function showLevelResult() {
  const total = levelCorrect + levelWrong;
  const pct = total > 0 ? Math.round(levelCorrect / total * 100) : 0;
  const passed = pct >= PASS_PCT;
  if (!levelResults[currentLevel]) levelResults[currentLevel] = { attempts: 0 };
  levelResults[currentLevel].attempts++;
  levelResults[currentLevel].passed = passed;
  levelResults[currentLevel].pct = pct;
  saveState();
  document.getElementById('quiz-card').classList.add('hidden');
  const area = document.getElementById('level-result-area'); area.classList.remove('hidden');
  const isLast = currentLevel >= TOTAL_LEVELS;
  if (passed) {
    area.innerHTML = `<div class="level-result"><div class="emoji">${isLast?'🏆':'🎉'}</div><div class="title">${isLast?'Барлық деңгейлер өтілді!':'Деңгей '+currentLevel+' өтілді!'}</div><div class="sub">${pct}% дұрыс · ${levelResults[currentLevel].attempts} әрекет</div><div class="stat-row"><div class="stat-box"><div class="val" style="color:var(--green)">${levelCorrect}</div><div class="lbl">Дұрыс</div></div><div class="stat-box"><div class="val" style="color:var(--red)">${levelWrong}</div><div class="lbl">Қате</div></div><div class="stat-box"><div class="val" style="color:var(--primary)">${pct}%</div><div class="lbl">Пайыз</div></div></div><button class="btn ${isLast?'btn-primary':'btn-green'} btn-block" onclick="${isLast?'showEnd()':'startLevel('+(currentLevel+1)+')'}">${isLast?'🏆 Нәтижелерді көру':'Деңгей '+(currentLevel+1)+'-ге өту →'}</button></div>`;
    spawnConfetti();
  } else {
    area.innerHTML = `<div class="level-result"><div class="emoji">💪</div><div class="title">Деңгей ${currentLevel} өтілмеді</div><div class="sub">${pct}% · Кемінде ${PASS_PCT}% қажет</div><div class="stat-row"><div class="stat-box"><div class="val" style="color:var(--green)">${levelCorrect}</div><div class="lbl">Дұрыс</div></div><div class="stat-box"><div class="val" style="color:var(--red)">${levelWrong}</div><div class="lbl">Қате</div></div><div class="stat-box"><div class="val" style="color:var(--primary)">${pct}%</div><div class="lbl">Пайыз</div></div></div><button class="btn btn-primary btn-block" onclick="startLevel(${currentLevel})">🔄 Қайта тапсыру</button></div>`;
  }
}

async function sendScore(finished) {
  if (!sessionCode || !studentName) return;
  let currentAway = awaySeconds;
  if (awayStart) currentAway += Math.round((Date.now() - awayStart) / 1000);
  const totalAnswers = stats.correct + stats.wrong;
  const encodedTotal = (currentLevel - 1) * 1000 + totalAnswers;
  try {
    const res = await fetch(`${BACKEND}/submit`, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code:sessionCode, studentId, name:studentName, score:stats.correct, total:encodedTotal, finished:finished===true||(currentLevel>TOTAL_LEVELS), focused:isFocused, tabSwitches, awaySeconds:currentAway })
    });
    const data = await res.json();
    if (data.status === 'ended' || data.status === 'not_found') showEnd();
  } catch (_) {}
}

function showEnd() {
  if (sessionEnded) return; sessionEnded = true;
  if (submitInterval) { clearInterval(submitInterval); submitInterval = null; }
  if (statusPollInterval) { clearInterval(statusPollInterval); statusPollInterval = null; }
  const total = stats.correct + stats.wrong;
  const pct = total > 0 ? Math.round(stats.correct / total * 100) : 0;
  document.getElementById('res-correct').textContent = stats.correct;
  document.getElementById('res-wrong').textContent = stats.wrong;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-emoji').textContent = pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  let html = '';
  for (let lv = 1; lv <= TOTAL_LEVELS; lv++) {
    const r = levelResults[lv];
    if (r) html += `<div class="lv-row"><span class="lv-badge">${r.passed?'✅':'❌'} Деңгей ${lv}</span><span class="lv-status">${r.pct}% · ${r.attempts} әрекет</span></div>`;
    else html += `<div class="lv-row"><span class="lv-badge">⬜ Деңгей ${lv}</span><span class="lv-status" style="color:var(--muted)">—</span></div>`;
  }
  document.getElementById('levels-summary').innerHTML = html;
  show('s-results'); if (pct >= 70) spawnConfetti(); clearState();
}

function updateStats() {
  document.getElementById('st-total').textContent = stats.correct + stats.wrong;
  document.getElementById('st-correct').textContent = stats.correct;
  document.getElementById('st-wrong').textContent = stats.wrong;
  document.getElementById('st-streak').textContent = stats.streak;
}
</script>
</body>
</html>
