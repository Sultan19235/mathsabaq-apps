<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Шамалар тәуелділігі — Оқушы</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{--bg:#f0f2f8;--bg2:#ffffff;--bg3:#e6e9f0;--border:#d2d6e2;--text:#141826;--text2:#3b4063;--muted:#7a7f9a;--primary:#4338ca;--primary-light:#eef0ff;--primary-dark:#3730a3;--green:#059669;--green-light:#ecfdf5;--green-border:#6ee7b7;--red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;--amber:#d97706;--r:14px;--shadow-sm:0 1px 3px rgba(20,24,38,.05);--shadow:0 2px 10px rgba(20,24,38,.07);--shadow-lg:0 8px 30px rgba(20,24,38,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden}
.screen{display:none;min-height:100vh;animation:fadeUp .3s ease}.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cfFall{from{transform:translateY(-20px) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.container{max-width:520px;margin:0 auto;padding:1rem;padding-bottom:2rem}
.join-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.join-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.join-logo{text-align:center;margin-bottom:20px}.join-icon{font-size:2.4rem;margin-bottom:6px}.join-title{font-size:1.3rem;font-weight:800;margin-bottom:2px}.join-sub{color:var(--muted);font-size:.82rem}
.field{margin-bottom:12px}.field label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px}
.field input{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;outline:none;transition:border-color .15s;background:var(--bg)}.field input:focus{border-color:var(--primary)}
.field input.code-input{font-family:'JetBrains Mono',monospace;font-size:1.3rem;text-align:center;letter-spacing:6px;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;touch-action:manipulation;min-height:48px}.btn:active{transform:scale(.97)}.btn-block{width:100%}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(67,56,202,.3)}.btn-amber{background:var(--amber);color:#fff}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.err{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:10px 14px;color:var(--red);font-size:.82rem;font-weight:500;display:none;margin-bottom:10px}.err.on{display:block}
.wait-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}.wait-icon{font-size:3.5rem;margin-bottom:12px}.wait-title{font-size:1.2rem;font-weight:800;margin-bottom:6px}.wait-sub{color:var(--muted);font-size:.86rem;margin-bottom:16px}.wait-name{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:4px 14px;font-size:.82rem;font-weight:700;margin-top:8px}
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:14px}.dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.2s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
.level-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap}.level-badge{background:var(--primary);color:#fff;padding:4px 12px;border-radius:10px;font-size:.72rem;font-weight:800;letter-spacing:1px}.level-progress{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:60px}.level-progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s ease}.level-info{font-size:.72rem;color:var(--muted);font-weight:600}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.6rem .4rem;text-align:center;box-shadow:var(--shadow-sm)}.stat-card.hl{background:var(--primary-light);border-color:rgba(67,56,202,.25)}.stat-icon{font-size:1rem;margin-bottom:.15rem}.stat-value{font-size:1.25rem;font-weight:800;color:var(--primary)}.stat-card.g .stat-value{color:var(--green)}.stat-card.r .stat-value{color:var(--red)}.stat-card.a .stat-value{color:var(--amber)}.stat-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:700}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.25rem;box-shadow:var(--shadow)}
.q-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--primary-light);color:var(--primary);padding:.3rem .7rem;border-radius:16px;font-size:.72rem;font-weight:700;margin-bottom:.75rem}
.q-text{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.7;margin-bottom:1rem;padding:.6rem .8rem;background:var(--bg);border-radius:12px;border:1px solid var(--border)}.q-text .katex{font-size:1.05em}
.opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.opt{display:flex;align-items:center;gap:.6rem;padding:.75rem .85rem;border:2.5px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s;background:var(--bg2);min-height:52px}.opt:active{transform:scale(.98)}.opt.selected{border-color:var(--primary);background:var(--primary-light)}.opt.correct{border-color:var(--green);background:var(--green-light)}.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt-label{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;flex-shrink:0;color:var(--muted);transition:all .2s}.opt.selected .opt-label{background:var(--primary);color:#fff}.opt.correct .opt-label{background:var(--green);color:#fff}.opt.wrong .opt-label{background:var(--red);color:#fff}
.opt-text{font-size:.88rem;font-weight:600;flex:1;line-height:1.4}.opt-text .katex{font-size:1em}
.feedback{text-align:center;padding:.85rem;border-radius:12px;margin-bottom:.75rem;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:.4rem}.feedback.correct{background:var(--green-light);color:var(--green);border:1px solid var(--green)}.feedback.wrong{background:var(--red-light);color:var(--red);border:1px solid var(--red)}
.solution-box{background:#f8f9fc;border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.75rem;font-size:.84rem;line-height:1.8;color:var(--text2)}.solution-box .sol-title{font-weight:800;color:var(--primary);margin-bottom:.4rem;font-size:.78rem;text-transform:uppercase;letter-spacing:1px}.solution-box .katex{font-size:1em}
.btn-group{display:flex;gap:.6rem;justify-content:center;align-items:center;flex-wrap:wrap}.hidden{display:none!important}
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px}.help-overlay.on{display:flex}
.help-modal{background:var(--bg2);border-radius:20px;padding:24px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.help-title{font-size:1.1rem;font-weight:800;margin-bottom:14px}.help-section{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}.help-section-title{font-weight:700;font-size:.82rem;color:var(--primary);margin-bottom:6px}.help-formula{font-size:.92rem;margin-bottom:4px;line-height:1.8}.help-close{margin-top:10px}
.level-complete{text-align:center;padding:1.5rem;animation:fadeUp .3s ease}.lc-icon{font-size:3rem;margin-bottom:8px}.lc-title{font-size:1.2rem;font-weight:800;margin-bottom:4px}.lc-sub{color:var(--muted);font-size:.86rem;margin-bottom:16px}.lc-stats{display:flex;gap:12px;justify-content:center;margin-bottom:16px}.lc-stat{text-align:center}.lc-stat-val{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}.lc-stat-lbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:700}
.res-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:400px;text-align:center;box-shadow:var(--shadow-lg)}.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.res-stat{background:var(--bg);border-radius:12px;padding:12px 8px}.res-val{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}.res-lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px}
.cfw{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}.cfp{position:absolute;animation:cfFall linear forwards}
</style>
</head>
<body>
<div class="cfw" id="confetti"></div>
<div class="help-overlay" id="help-overlay" onclick="if(event.target===this)closeHelp()"><div class="help-modal" id="help-modal-content"></div></div>

<div class="screen active" id="s-join"><div class="join-wrap"><div class="join-card">
  <div class="join-logo"><div class="join-icon">📐</div><div class="join-title">Шамалар тәуелділігі</div><div class="join-sub">Формулалар мен тәуелділіктер</div></div>
  <div class="err" id="join-err"></div>
  <div class="field"><label>Аты-жөні</label><input type="text" id="sname" placeholder="Атыңызды жазыңыз" maxlength="20" autocomplete="off"></div>
  <div class="field" id="code-wrap"><label>Бөлме коды</label><input type="text" id="scode" class="code-input" placeholder="------" maxlength="6" autocomplete="off"></div>
  <button class="btn btn-primary btn-block" id="join-btn" style="margin-top:4px" onclick="joinQuiz()">🚀 Кіру</button>
</div></div></div>

<div class="screen" id="s-wait"><div class="wait-wrap"><div class="wait-icon">✅</div><div class="wait-title">Қосылдыңыз!</div><div class="wait-sub">Мұғалім сабақты бастағанша күтіңіз</div><div class="wait-name" id="wait-name"></div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>

<div class="screen" id="s-quiz"><div class="container">
  <div class="level-bar"><span class="level-badge" id="level-badge">ДЕҢГЕЙ 1</span><div class="level-progress"><div class="level-progress-fill" id="level-fill" style="width:0%"></div></div><span class="level-info" id="level-info">0/10</span><button class="btn btn-amber" style="padding:6px 14px;font-size:.76rem;min-height:32px" onclick="openHelp()">📖 Көмек</button></div>
  <div class="stats-bar"><div class="stat-card hl"><div class="stat-icon">📊</div><div class="stat-value" id="st-total">0</div><div class="stat-label">Жауап</div></div><div class="stat-card g"><div class="stat-icon">✓</div><div class="stat-value" id="st-correct">0</div><div class="stat-label">Дұрыс</div></div><div class="stat-card r"><div class="stat-icon">✗</div><div class="stat-value" id="st-wrong">0</div><div class="stat-label">Қате</div></div><div class="stat-card a"><div class="stat-icon">🔥</div><div class="stat-value" id="st-streak">0</div><div class="stat-label">Қатарынан</div></div></div>
  <div class="quiz-card" id="quiz-area"></div>
</div></div>

<div class="screen" id="s-results"><div class="res-wrap"><div class="res-card">
  <div style="font-size:3rem;margin-bottom:8px" id="res-emoji">🏆</div>
  <div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">Тест аяқталды!</div>
  <div style="color:var(--muted);font-size:.86rem" id="res-level-info"></div>
  <div class="res-stats"><div class="res-stat"><div class="res-val" id="res-correct" style="color:var(--green)">0</div><div class="res-lbl">Дұрыс</div></div><div class="res-stat"><div class="res-val" id="res-wrong" style="color:var(--red)">0</div><div class="res-lbl">Қате</div></div><div class="res-stat"><div class="res-val" id="res-pct" style="color:var(--primary)">0%</div><div class="res-lbl">Пайыз</div></div></div>
  <p style="color:var(--muted);margin-top:16px;font-size:.82rem">Нәтижелер мұғалімге жіберілді ✓</p>
</div></div></div>

<script>
const BACKEND='https://mathsabaq.online';const STORAGE_KEY_PREFIX='ms_depformula_';
function K(s){return katex.renderToString(s,{throwOnError:false})}
const urlParams=new URLSearchParams(location.search);const urlCode=(urlParams.get('code')||'').toUpperCase();
let sessionCode='',studentId='',studentName='',stats={correct:0,wrong:0,streak:0},currentLevel=1,levelQIndex=0,levelCorrect=0,levelWrong=0,levelQuestions=[],quiz={selected:null,answered:false},submitInterval=null,statusPollInterval=null,quizStarted=false,sessionEnded=false;
const TOTAL_LEVELS=5,QS_PER_LEVEL=10,PASS_THRESHOLD=0.7;
let isFocused=true,tabSwitches=0,awaySeconds=0,awayStart=null;
function markAway(){if(!isFocused)return;isFocused=false;tabSwitches++;awayStart=Date.now();saveState();sendScore()}
function markBack(){if(isFocused)return;isFocused=true;if(awayStart){awaySeconds+=Math.round((Date.now()-awayStart)/1000);awayStart=null}sendScore()}
document.addEventListener('visibilitychange',()=>{if(document.hidden)markAway();else markBack()});window.addEventListener('blur',markAway);window.addEventListener('focus',markBack);
function saveState(){if(!sessionCode)return;let ca=awaySeconds;if(awayStart)ca+=Math.round((Date.now()-awayStart)/1000);try{localStorage.setItem(STORAGE_KEY_PREFIX+sessionCode,JSON.stringify({studentId,name:studentName,correct:stats.correct,wrong:stats.wrong,streak:stats.streak,currentLevel,levelQIndex,levelCorrect,levelWrong,tabSwitches,awaySeconds:ca,ts:Date.now()}))}catch(_){}}
function loadState(c){try{const r=localStorage.getItem(STORAGE_KEY_PREFIX+c);if(!r)return null;const d=JSON.parse(r);if(Date.now()-d.ts>3*3600000){localStorage.removeItem(STORAGE_KEY_PREFIX+c);return null}return d}catch(_){return null}}
function clearState(){if(sessionCode)try{localStorage.removeItem(STORAGE_KEY_PREFIX+sessionCode)}catch(_){}}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function shuffleArray(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function rc(a){return a[Math.floor(Math.random()*a.length)]}
function spawnConfetti(){const w=document.getElementById('confetti');w.innerHTML='';const c=['#4338ca','#2563eb','#d97706','#059669','#dc2626'];for(let i=0;i<60;i++){const e=document.createElement('div');e.className='cfp';const s=5+Math.random()*9;e.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${c[~~(Math.random()*c.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.4}s`;w.appendChild(e)}setTimeout(()=>w.innerHTML='',6000)}
if(urlCode){sessionCode=urlCode;document.getElementById('scode').value=urlCode;document.getElementById('code-wrap').style.display='none'}
function openHelp(){document.getElementById('help-modal-content').innerHTML=`<div class="help-title">📖 Формулалар анықтамасы</div><div class="help-section"><div class="help-section-title">🔵 Шеңбер</div><div class="help-formula">Аудан: ${K('S = \\pi r^2')}<br><small style="color:var(--muted)">${K('r')} — радиус, ${K('\\pi \\approx 3{,}14')}</small></div></div><div class="help-section"><div class="help-section-title">🟦 Шаршы</div><div class="help-formula">${K('S = a^2')} &nbsp;|&nbsp; ${K('P = 4a')}</div></div><div class="help-section"><div class="help-section-title">🟩 Тіктөртбұрыш</div><div class="help-formula">${K('S = a \\cdot b')} &nbsp;|&nbsp; ${K('P = 2(a+b)')}</div></div><div class="help-section"><div class="help-section-title">🔺 Тең қабырғалы үшбұрыш</div><div class="help-formula">${K('P = 3a')}</div></div><div class="help-section"><div class="help-section-title">🚢 Өзен бойымен қозғалыс</div><div class="help-formula">Ағыспен: ${K('v_{\\text{ағ}} = v + u')}<br>Ағысқа қарсы: ${K('v_{\\text{қ}} = v - u')}</div></div><div class="help-section"><div class="help-section-title">📏 Жол · Жылдамдық · Уақыт</div><div class="help-formula">${K('s = v \\cdot t')} &nbsp; ${K('v = s/t')} &nbsp; ${K('t = s/v')}</div></div><div class="help-section"><div class="help-section-title">💰 Құн · Баға · Сан</div><div class="help-formula">${K('C = p \\cdot n')}</div></div><button class="btn btn-primary btn-block help-close" onclick="closeHelp()">Жабу</button>`;document.getElementById('help-overlay').classList.add('on')}
function closeHelp(){document.getElementById('help-overlay').classList.remove('on')}
(async function tryReconnect(){if(!urlCode)return;const saved=loadState(urlCode);if(!saved)return;try{const r=await fetch(BACKEND+'/status?code='+urlCode);const t=await r.text();let d;try{d=JSON.parse(t)}catch(_){return}if(d.status==='not_found'||d.status==='ended'){clearState();return}sessionCode=urlCode;studentId=saved.studentId;studentName=saved.name;stats={correct:saved.correct||0,wrong:saved.wrong||0,streak:saved.streak||0};currentLevel=saved.currentLevel||1;levelQIndex=saved.levelQIndex||0;levelCorrect=saved.levelCorrect||0;levelWrong=saved.levelWrong||0;tabSwitches=saved.tabSwitches||0;awaySeconds=saved.awaySeconds||0;if(d.status==='active')startQuiz();else if(d.status==='waiting')showWait()}catch(_){}})();
async function joinQuiz(){const name=document.getElementById('sname').value.trim();const code=(urlCode||document.getElementById('scode').value.trim()).toUpperCase();const err=document.getElementById('join-err');if(!name){err.textContent='Атыңызды жазыңыз';err.classList.add('on');return}if(code.length<4){err.textContent='Бөлме кодын енгізіңіз';err.classList.add('on');return}err.classList.remove('on');const btn=document.getElementById('join-btn');btn.disabled=true;btn.textContent='⏳ Қосылуда...';sessionCode=code;studentName=name;studentId='stu_'+Math.random().toString(36).substr(2,9);let retries=3;while(retries>0){try{const c=new AbortController();const to=setTimeout(()=>c.abort(),10000);const res=await fetch(BACKEND+'/status?code='+code,{signal:c.signal});clearTimeout(to);const txt=await res.text();let data;try{data=JSON.parse(txt)}catch(_){throw new Error('bad')}if(data.status==='not_found'){err.textContent='Бөлме табылмады.';err.classList.add('on');btn.disabled=false;btn.textContent='🚀 Кіру';return}if(data.status==='ended'){err.textContent='Бұл сабақ аяқталған.';err.classList.add('on');btn.disabled=false;btn.textContent='🚀 Кіру';return}stats={correct:0,wrong:0,streak:0};currentLevel=1;levelQIndex=0;levelCorrect=0;levelWrong=0;await sendScore();saveState();btn.disabled=false;btn.textContent='🚀 Кіру';if(data.status==='active')startQuiz();else showWait();return}catch(e){retries--;if(retries>0)await new Promise(r=>setTimeout(r,2000))}}err.textContent='Серверге қосылу мүмкін болмады.';err.classList.add('on');btn.disabled=false;btn.textContent='🚀 Кіру'}
document.addEventListener('keydown',e=>{if(document.getElementById('s-join').classList.contains('active')&&e.key==='Enter')joinQuiz()});
function showWait(){document.getElementById('wait-name').textContent=studentName;show('s-wait');if(statusPollInterval)clearInterval(statusPollInterval);statusPollInterval=setInterval(pollStatus,2000)}
async function pollStatus(){try{const res=await fetch(BACKEND+'/status?code='+sessionCode);const t=await res.text();let d;try{d=JSON.parse(t)}catch(_){return}if(d.status==='active'){clearInterval(statusPollInterval);statusPollInterval=null;startQuiz()}else if(d.status==='ended'||d.status==='not_found'){clearInterval(statusPollInterval);statusPollInterval=null;showEnd()}}catch(_){}}
function startQuiz(){if(quizStarted)return;quizStarted=true;updateStats();show('s-quiz');generateLevelQuestions();renderQuestion();sendScore();if(submitInterval)clearInterval(submitInterval);submitInterval=setInterval(sendScore,5000)}
async function sendScore(finished){if(!sessionCode||!studentName)return;let ca=awaySeconds;if(awayStart)ca+=Math.round((Date.now()-awayStart)/1000);try{const res=await fetch(BACKEND+'/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:sessionCode,studentId,name:studentName,score:stats.correct,total:(currentLevel-1)*1000+(stats.correct+stats.wrong),finished:finished===true,focused:isFocused,tabSwitches,awaySeconds:ca})});const t=await res.text();let d;try{d=JSON.parse(t)}catch(_){return}if(d.status==='ended'||d.status==='not_found')showEnd()}catch(_){}}
function showEnd(){if(sessionEnded)return;sessionEnded=true;if(submitInterval){clearInterval(submitInterval);submitInterval=null}if(statusPollInterval){clearInterval(statusPollInterval);statusPollInterval=null}const total=stats.correct+stats.wrong;const pct=total>0?Math.round(stats.correct/total*100):0;document.getElementById('res-correct').textContent=stats.correct;document.getElementById('res-wrong').textContent=stats.wrong;document.getElementById('res-pct').textContent=pct+'%';document.getElementById('res-emoji').textContent=pct>=70?'🎉':pct>=40?'👍':'💪';document.getElementById('res-level-info').textContent='Деңгей: '+currentLevel+' / '+TOTAL_LEVELS;show('s-results');if(pct>=70)spawnConfetti();clearState()}
function updateStats(){document.getElementById('st-total').textContent=stats.correct+stats.wrong;document.getElementById('st-correct').textContent=stats.correct;document.getElementById('st-wrong').textContent=stats.wrong;document.getElementById('st-streak').textContent=stats.streak}
function updateLevelBar(){document.getElementById('level-badge').textContent='ДЕҢГЕЙ '+currentLevel;document.getElementById('level-fill').style.width=(levelQIndex/QS_PER_LEVEL*100)+'%';document.getElementById('level-info').textContent=levelQIndex+'/'+QS_PER_LEVEL}

const NF=['Айгерім','Дана','Мадина','Ботагөз','Жансая','Ақмарал','Гүлнұр','Назерке'];
const NM=['Бауыржан','Мұрат','Ерлан','Жанболат','Асқар','Нұрлан','Дәулет','Тимур'];
function rn(){return rc([...NF,...NM])}
function rndPi(v){return Math.round(v*100)/100}
function generateQuestion(level){return[genL1,genL2,genL3,genL4,genL5][level-1]()}

()=>{const a=ri(5,14);const b=ri(3,10);const S=a*b;const n=rn();return{q:n+' қабырғаны бояйды: '+K(a+'')+' м × '+K(b+'')+' м. Бояу ауданы?',opts:[K((2*(a+b))+''),K((a+b)+''),K(S+''),K((S+a)+'')],correct:2,solution:K('S='+a+'\\cdot'+b+'='+S)+' м².'}},
()=>{const a=ri(8,30);const P=4*a;const n=rn();return{q:n+' шаршы алаңды айналып жүгіреді. Қабырғасы '+K(a+'')+' м. Бір айналым?',opts:[K((a*a)+''),K(P+''),K((2*a)+''),K((P+4)+'')],correct:1,solution:K('P=4\\cdot'+a+'='+P)+' м.'}},
()=>{const v=ri(20,40);const u=ri(2,6);const t=ri(2,5);const d=rc(['d','u']);const sp=d==='d'?v+u:v-u;const s=sp*t;const dt=d==='d'?'ағыспен':'ағысқа қарсы';return{q:rn()+' кемесі '+dt+' жүзіп барады. Меншікті: '+K(v+'')+', ағыс: '+K(u+'')+' км/сағ. '+K(t+'')+' сағатта қанша км жүзді?',opts:[K(s+''),K((v*t)+''),K((u*t)+''),K((s+v)+'')],correct:0,solution:dt+' жылдамдық: '+K(sp+'')+'. Жол: '+K(sp+'\\cdot'+t+'='+s)+' км.'}},
()=>{const st=rc([0.5,0.6,0.7,0.8]);const n=rc([40,50,60,80,100]);const L=st*n;return{q:'Баланың бір қадамы '+K(st+'')+' м. '+K(n+'')+' қадам жасаса, неше метр жүреді?',opts:[K(L+''),K((n+st)+''),K((n-st)+''),K((L+5)+'')],correct:0,solution:K('L='+st+'\\cdot'+n+'='+L)+' м.'}},
()=>{const st=rc([2000,3000,5000]);const pd=rc([100,150,200,250]);const d=ri(5,14);const S=st+pd*d;return{q:rn()+' '+K(st+'')+' тг-сі бар. Күн сайын '+K(pd+'')+' тг қосады. '+K(d+'')+' күннен кейін қанша?',opts:[K(S+''),K((st*d)+''),K((pd*d)+''),K((S+200)+'')],correct:0,solution:K(st+'+'+pd+'\\cdot'+d+'='+(st)+'+'+(pd*d)+'='+S)+' тг.'}},
()=>{const a=10;const bv=rc([4,5,6,7,8]);const S=a*bv;return{q:'Тіктөртбұрыш: ұзындығы '+K('10')+' см, ені '+K('b='+bv)+' см. Ауданын табыңыз.',opts:[K(S+'\\text{ см}^2'),K((2*(a+bv))+'\\text{ см}^2'),K((a+bv)+'\\text{ см}^2'),K((S+10)+'\\text{ см}^2')],correct:0,solution:K('S=10\\cdot'+bv+'='+S)+' см².'}},
];return rc(pool)()}

// ── LEVEL 5: Күрделі есептер ────────────────────────────
function genL5(){const pool=[
()=>{const a=ri(3,15);const S=a*a;return{q:'Шаршы ауданы '+K('S='+S)+' см². Қабырғасын табыңыз.',opts:[K(a+''),K((S/4)+''),K((a+1)+''),K((a*2)+'')],correct:0,solution:K('a=\\sqrt{'+S+'}='+a)+' см.'}},
()=>{const a=ri(5,18);const b=ri(3,12);const P=2*(a+b);return{q:'Тіктөртбұрыш периметрі '+K('P='+P)+' см, бір қабырғасы '+K(a+'')+' см. Екіншісін табыңыз.',opts:[K(b+''),K((P-a)+''),K((P/2)+''),K((b+2)+'')],correct:0,solution:K(P+'=2('+a+'+b)')+'→'+K('b=\\dfrac{'+P+'}{2}-'+a+'='+(P/2)+'-'+a+'='+b)+' см.'}},
()=>{const v=ri(25,45);const u=ri(2,8);const diff=2*u;return{q:'Кеме меншікті '+K(v+'')+', ағыс '+K(u+'')+' км/сағ. Ағыспен және ағысқа қарсы жылдамдықтар айырмасы?',opts:[K(diff+''),K(u+''),K((diff+2)+''),K(v+'')],correct:0,solution:K((v+u)+'-'+(v-u)+'='+diff+'=2u')+'.'}},
()=>{const r1=ri(2,5);const r2=r1*2;return{q:'Бірінші шеңбер радиусы '+K(r1+'')+' см, екіншісі '+K(r2+'')+' см. Екіншінің ауданы біріншіден неше есе үлкен?',opts:[K('2')+' есе',K('4')+' есе',K('3')+' есе',K('6')+' есе'],correct:1,solution:'Радиус 2 есе → аудан '+K('2^2=4')+' есе артады.'}},
()=>{const v=ri(20,40);const u=ri(2,6);const vD=v+u;return{q:'Кеменің ағыспен жылдамдығы '+K(vD+'')+', ағыс '+K(u+'')+' км/сағ. Меншікті жылдамдығын табыңыз.',opts:[K((vD+u)+''),K(v+''),K((vD*u)+''),K((v+2)+'')],correct:1,solution:K('v='+vD+'-'+u+'='+v)+' км/сағ.'}},
()=>{const a=ri(4,25);const P=4*a;return{q:'Шаршы периметрі '+K('P='+P)+' см. Қабырғасын табыңыз.',opts:[K((P/2)+''),K(a+''),K((a*a)+''),K((a+1)+'')],correct:1,solution:K('a=\\dfrac{'+P+'}{4}='+a)+' см.'}},
()=>{const a=ri(5,12);const b=ri(3,8);const S=a*b;const P=2*(a+b);const sum=S+P;return{q:'Тіктөртбұрыш: '+K(a+'')+' см × '+K(b+'')+' см. Ауданы мен периметрінің қосындысы?',opts:[K(sum+''),K((S*P)+''),K((S-P)+''),K((sum+5)+'')],correct:0,solution:K('S='+S)+', '+K('P='+P)+'. Қосынды: '+K(S+'+'+P+'='+sum)+'.'}},
()=>{const v=ri(20,40);const u=ri(2,7);const vU=v-u;return{q:'Кеме ағысқа қарсы жылдамдығы '+K(vU+'')+', ағыс '+K(u+'')+' км/сағ. Меншікті жылдамдығын табыңыз.',opts:[K(v+''),K((vU-u)+''),K((vU*u)+''),K((v+3)+'')],correct:0,solution:K('v='+vU+'+'+u+'='+v)+' км/сағ.'}},
()=>{const r=ri(2,8);const S=rndPi(3.14*r*r);return{q:'Шеңбер ауданы '+K(S+'')+' см². Радиусын табыңыз. ('+K('\\pi\\approx3{,}14')+')',opts:[K(r+''),K((r*2)+''),K((r+1)+''),K((r-1)+'')],correct:0,solution:K('r^2=\\dfrac{'+S+'}{3{,}14}\\approx'+(r*r))+'→'+K('r='+r)+' см.'}},
()=>{const v1=ri(15,30);const v2=ri(20,35);const t=ri(2,4);const D=(v1+v2)*t;return{q:'Екі кеме қарама-қарсы жүзіп барады: '+K(v1+'')+' және '+K(v2+'')+' км/сағ. Ара қашықтық '+K(D+'')+' км. Қанша сағатта кездеседі?',opts:[K(t+''),K(Math.round(D/v1)+''),K(Math.round(D/v2)+''),K((t+1)+'')],correct:0,solution:'Жақындасу: '+K(v1+'+'+v2+'='+(v1+v2))+' км/сағ. Уақыт: '+K('\\dfrac{'+D+'}{'+(v1+v2)+'}='+t)+' сағ.'}},
];return rc(pool)()}

// ══════════════════════════════════════════════════════════
//  LEVEL MANAGEMENT
// ══════════════════════════════════════════════════════════
function generateLevelQuestions(){levelQuestions=[];for(let i=0;i<QS_PER_LEVEL;i++)levelQuestions.push(generateQuestion(currentLevel))}
function renderQuestion(){if(levelQIndex>=QS_PER_LEVEL){showLevelComplete();return}updateLevelBar();const q=levelQuestions[levelQIndex];quiz={selected:null,answered:false};const labels=['A','B','C','D'];const idx=[0,1,2,3];const sh=shuffleArray(idx);const nc=sh.indexOf(q.correct);
document.getElementById('quiz-area').innerHTML=`<div class="q-badge"><span>📝</span><span>Деңгей ${currentLevel} · Есеп ${levelQIndex+1}/${QS_PER_LEVEL}</span></div><div class="q-text">${q.q}</div><div class="opts" id="opts">${sh.map((oi,i)=>`<div class="opt" data-idx="${i}" data-correct="${i===nc}" onclick="selectOpt(${i})"><span class="opt-label">${labels[i]}</span><span class="opt-text">${q.opts[oi]}</span></div>`).join('')}</div><div class="feedback hidden" id="feedback"></div><div class="solution-box hidden" id="solution-box"><div class="sol-title">📝 Шешуі</div><div id="solution-text"></div></div><div class="btn-group"><button class="btn btn-primary" id="check-btn" onclick="checkAnswer()" disabled>✓ Тексеру</button><button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">Келесі →</button></div>`;
quiz.correctIdx=nc;quiz.solution=q.solution}
function selectOpt(i){if(quiz.answered)return;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));document.querySelector(`.opt[data-idx="${i}"]`).classList.add('selected');quiz.selected=i;document.getElementById('check-btn').disabled=false}
function checkAnswer(){if(quiz.selected===null||quiz.answered)return;quiz.answered=true;const opts=document.querySelectorAll('.opt');const sel=opts[quiz.selected];const ok=sel.dataset.correct==='true';opts.forEach(o=>{o.style.pointerEvents='none';if(o.dataset.correct==='true')o.classList.add('correct');else if(o===sel)o.classList.add('wrong')});const fb=document.getElementById('feedback');fb.classList.remove('hidden','correct','wrong');if(ok){stats.correct++;stats.streak++;levelCorrect++;fb.classList.add('correct');fb.textContent='✓ Дұрыс!'}else{stats.wrong++;stats.streak=0;levelWrong++;fb.classList.add('wrong');fb.textContent='✗ Қате!'}document.getElementById('solution-text').innerHTML=quiz.solution;document.getElementById('solution-box').classList.remove('hidden');updateStats();saveState();sendScore();document.getElementById('check-btn').classList.add('hidden');document.getElementById('next-btn').classList.remove('hidden')}
function nextQuestion(){levelQIndex++;if(levelQIndex>=QS_PER_LEVEL)showLevelComplete();else renderQuestion()}
function showLevelComplete(){const pct=Math.round(levelCorrect/QS_PER_LEVEL*100);const passed=pct>=PASS_THRESHOLD*100;const isLast=currentLevel>=TOTAL_LEVELS;document.getElementById('quiz-area').innerHTML=`<div class="level-complete"><div class="lc-icon">${passed?(isLast?'🏆':'🎉'):'🔄'}</div><div class="lc-title">${passed?(isLast?'Барлық деңгейлер аяқталды!':'Деңгей '+currentLevel+' өтілді!'):'Деңгей өтілмеді'}</div><div class="lc-sub">${passed?(isLast?'Тамаша! Барлық 5 деңгейді аяқтадыңыз!':'Келесі деңгейге дайынсыз!'):'Қайталап көріңіз (70% қажет)'}</div><div class="lc-stats"><div class="lc-stat"><div class="lc-stat-val" style="color:var(--green)">${levelCorrect}</div><div class="lc-stat-lbl">Дұрыс</div></div><div class="lc-stat"><div class="lc-stat-val" style="color:var(--red)">${levelWrong}</div><div class="lc-stat-lbl">Қате</div></div><div class="lc-stat"><div class="lc-stat-val" style="color:var(--primary)">${pct}%</div><div class="lc-stat-lbl">Пайыз</div></div></div><button class="btn btn-primary btn-block" onclick="handleLevelResult(${passed},${isLast})">${passed?(isLast?'🏆 Нәтижелерді көру':'→ Келесі деңгей'):'🔄 Қайталау'}</button></div>`;if(passed)spawnConfetti()}
function handleLevelResult(p,l){if(p&&l){sendScore(true);showEnd();return}if(p)currentLevel++;levelQIndex=0;levelCorrect=0;levelWrong=0;generateLevelQuestions();renderQuestion();updateLevelBar();saveState()}
</script>
